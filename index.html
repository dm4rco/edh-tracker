}

/* ===== COMMANDER PACE (which commanders => fast/slow games) ===== */
const PACE_MIN_GAMES = 4;        // min timed appearances for a commander to qualify
const PACE_SHOW = 8;             // entries per column
function computeCommanderPace(){
  const games=gamesForYear().filter(g=>g.gametime!=null);
  if(games.length<2) return null;
  const overallAvg = games.reduce((s,g)=>s+g.gametime,0)/games.length;
  const cmd={}; // commander -> {sum,n}
  for(const g of games){
    // a commander counts once per game even if (somehow) duplicated
    const seen=new Set();
    for(const s of g.seats){
      if(seen.has(s.commander)) continue;
      seen.add(s.commander);
      const c=cmd[s.commander]||(cmd[s.commander]={sum:0,n:0});
      c.sum+=g.gametime; c.n++;
    }
  }
  const arr=Object.entries(cmd)
    .filter(([_,c])=>c.n>=PACE_MIN_GAMES)
    .map(([name,c])=>({name,games:c.n,avg:c.sum/c.n,delta:(c.sum/c.n)-overallAvg}))
    .sort((a,b)=>a.delta-b.delta);
  if(!arr.length) return null;
  const maxAbs=Math.max(...arr.map(a=>Math.abs(a.delta)),1);
  return {overallAvg:Math.round(overallAvg), rows:arr, maxAbs};
}

function renderPace(){
  const grid=$('#paceGrid'); if(!grid) return;
  const help=$('#paceHelp');
  const d=computeCommanderPace();
  if(!d){
    if(help) help.textContent='';
    grid.innerHTML=`<div class="empty">${t('pace_none')}</div>`;
    return;
  }
  if(help) help.innerHTML=t('pace_help',{avg:d.overallAvg});

  const fastest=d.rows.filter(r=>r.delta<0).slice(0,PACE_SHOW);
  const slowest=d.rows.filter(r=>r.delta>0).slice(-PACE_SHOW).reverse();

  const rowHtml=(r)=>{
    const fast=r.delta<0;
    const w=Math.abs(r.delta)/d.maxAbs*50; // half-width track (50% each side)
    const mins=Math.abs(r.delta);
    const disp=(mins>=10?Math.round(mins):mins.toFixed(1));
    return `<div class="pace-row" data-cmd="${esc(r.name)}">
      <span class="pcm">${esc(r.name)}</span>
      <span class="pace-track"><span class="mid"></span><span class="fill ${fast?'f':'s'}" style="width:${w}%"></span></span>
      <span class="pace-delta ${fast?'f':'s'}">${fast?'−':'+'}${disp}m<small>${Math.round(r.avg)}m ${t('pace_avg')}</small></span>
    </div>`;
  };

  grid.innerHTML=`
    <div class="pace-col">
      <div class="pace-col-title fast">▼ ${t('pace_fastest')}</div>
      ${fastest.map(rowHtml).join('')||`<div class="empty" style="font-size:13px">—</div>`}
      <div class="pace-sub">${t('pace_min_note',{min:PACE_MIN_GAMES})}</div>
    </div>
    <div class="pace-col">
      <div class="pace-col-title slow">▲ ${t('pace_slowest')}</div>
      ${slowest.map(rowHtml).join('')||`<div class="empty" style="font-size:13px">—</div>`}
      <div class="pace-sub">${t('pace_vs_avg')}: ${d.overallAvg}m</div>
    </div>`;

  grid.querySelectorAll('.pace-row').forEach(el=>el.addEventListener('click',()=>openCommanderDetail(el.dataset.cmd)));
}




/* ===== commander detail computation (current year subset) ===== */
const CMD_MATCHUP_MIN = 3; // min games for a deck-vs-deck matchup to be shown
function computeCommanderDetail(cmdName){
  const games=gamesForYear();
  let g=0,w=0,rs=0,rn=0, solWith=0, solSeats=0, seatSum=0, seatN=0;
  const fin={1:0,2:0,3:0,4:0};
  const pilots={};          // player -> {g,w,rs}
  const vsPlayer={};        // opponent player -> {g,ahead,behind,ties}
  const vsCmd={};           // opponent commander -> {g,ahead,behind,ties}
  for(const gm of games){
    const me=gm.seats.find(s=>s.commander===cmdName);
    if(!me) continue;
    g++; if(me.rank===1)w++; rs+=me.rank; rn++;
    if(me.rank>=1&&me.rank<=4)fin[me.rank]++;
    if(me.sol!=null){solSeats++; if(me.sol===1)solWith++;}
    if(me.turn){seatSum+=me.turn; seatN++;}
    const pl=pilots[me.player]||(pilots[me.player]={g:0,w:0,rs:0});
    pl.g++; if(me.rank===1)pl.w++; pl.rs+=me.rank;
    for(const opp of gm.seats){
      if(opp===me) continue;
      const vp=vsPlayer[opp.player]||(vsPlayer[opp.player]={g:0,ahead:0,behind:0,ties:0});
      vp.g++; if(me.rank<opp.rank)vp.ahead++; else if(me.rank>opp.rank)vp.behind++; else vp.ties++;
      const vc=vsCmd[opp.commander]||(vsCmd[opp.commander]={g:0,ahead:0,behind:0,ties:0});
      vc.g++; if(me.rank<opp.rank)vc.ahead++; else if(me.rank>opp.rank)vc.behind++; else vc.ties++;
    }
  }
  if(g===0) return null;
  const pilotArr=Object.entries(pilots).map(([player,d])=>({player,games:d.g,wins:d.w,
    winrate:+(100*d.w/d.g).toFixed(1), avgrank:+(d.rs/d.g).toFixed(2)})).sort((a,b)=>b.games-a.games);
  const vsPlayerArr=Object.entries(vsPlayer).map(([player,d])=>({player,games:d.g,ahead:d.ahead,behind:d.behind,ties:d.ties,
    pct:+(100*d.ahead/d.g).toFixed(0)})).sort((a,b)=>b.pct-a.pct||b.games-a.games);
  const vsCmdArr=Object.entries(vsCmd).filter(([c,d])=>d.g>=CMD_MATCHUP_MIN).map(([cmd,d])=>({cmd,games:d.g,ahead:d.ahead,behind:d.behind,ties:d.ties,
    pct:+(100*d.ahead/d.g).toFixed(0)})).sort((a,b)=>b.pct-a.pct||b.games-a.games);
  return {
    name:cmdName, games:g, wins:w, winrate:+(100*w/g).toFixed(1), avgrank:+(rs/rn).toFixed(2),
    fin, finTot:fin[1]+fin[2]+fin[3]+fin[4],
    solRate: solSeats?+(100*solWith/solSeats).toFixed(0):null,
    avgSeat: seatN?+(seatSum/seatN).toFixed(1):null,
    pilots:pilotArr, vsPlayer:vsPlayerArr, vsCmd:vsCmdArr
  };
}

function openCommanderDetail(name){
  cdName=name;
  renderCommanderDetail();
  $('#views').style.display='none';
  $('#commanderDetail').classList.add('on');

/* ===== commander detail rendering ===== */
function renderCommanderDetail(){
  if(!cdName)return;
  const d=computeCommanderDetail(cdName);
  const cont=$('#commanderDetail');
  const backBtn=`<button class="md-back" id="cdBack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>${t('cd_back')}</button>`;
  if(!d){
    cont.innerHTML=backBtn+`<div class="empty">—</div>`;
    $('#cdBack').addEventListener('click',closeCommanderDetail); return;
  }
  const wrCol=wrColor(d.winrate);

  // hero stat cards
  const stats=[
    [t('cd_games'), d.games, ''],
    [t('cd_winrate'), d.winrate+'%', `color:${wrCol}`],
    [t('cd_avgfinish'), d.avgrank, ''],
    [t('cd_pilots'), d.pilots.length, ''],
  ];
  const heroStats=stats.map(s=>`<div class="cd-stat"><div class="cd-stat-v" style="${s[2]}">${s[1]}</div><div class="cd-stat-l">${s[0]}</div></div>`).join('');

  // finish spread mini-bar
  const segColors={1:'var(--gold)',2:'#9aa97f',3:'#6b7d6f',4:'#3a4a40'};
  const segLabels={1:t('finish_1st'),2:t('finish_2nd'),3:t('finish_3rd'),4:t('finish_4th')};
  const finBar=[1,2,3,4].map(r=>{
    const pct=d.finTot?100*d.fin[r]/d.finTot:0;
    if(pct<=0)return'';
    return `<div class="fd-seg" style="width:${pct}%;background:${segColors[r]}" title="${segLabels[r]}: ${d.fin[r]}">${pct>=10?Math.round(pct)+'%':''}</div>`;
  }).join('');
  const finLegend=[1,2,3,4].map(r=>`<span class="fd-leg-item"><span class="fd-leg-sw" style="background:${segColors[r]}"></span>${segLabels[r]} <b style="color:var(--ink2)">${d.fin[r]}</b></span>`).join('');

  // vs each player rows (sorted best->worst already)
  const vsPlayerRows=d.vsPlayer.map(v=>{
    const col=v.pct>=55?'var(--win)':v.pct<=45?'var(--lose)':'var(--gold)';
    return `<div class="cd-vp-row">
      <span class="cd-vp-name">${v.player}</span>
      <div class="cd-vp-track"><div class="cd-vp-fill" style="width:${v.pct}%;background:${col}"></div></div>
      <span class="cd-vp-pct" style="color:${col}">${v.pct}%</span>
      <span class="cd-vp-rec">${v.ahead}–${v.behind}${v.ties?'–'+v.ties:''}</span>
    </div>`;
  }).join('');

  // best / worst player callouts — require a meaningful sample so 1-game outliers
  // don't headline. Threshold scales down if the commander has few games overall.
  const CALL_MIN = Math.min(5, Math.max(2, Math.round(d.games/8)));
  const eligible = d.vsPlayer.filter(v=>v.games>=CALL_MIN);
  const pool = eligible.length>=2 ? eligible : d.vsPlayer; // fall back if too few qualify
  const bestP = pool[0];
  const worstP = pool[pool.length-1];

  // pilots
  const pilotRows=d.pilots.map(p=>{
    const col=wrColor(p.winrate);
    return `<div class="cd-pilot-row">
      <span class="cd-pilot-name">${p.player}</span>
      <span class="cd-pilot-games">${p.games} ${t('cd_games').toLowerCase()}</span>
      <div class="cd-pilot-track"><div class="cd-pilot-fill" style="width:${Math.max(p.winrate,3)}%;background:${col}"></div></div>
      <span class="cd-pilot-wr" style="color:${col}">${p.winrate}%</span>
    </div>`;
  }).join('');

  // deck matchups: best few and worst few
  let deckMatchupHtml='';
  if(d.vsCmd.length){
    const best=d.vsCmd.slice(0,5);
    const worst=d.vsCmd.slice(-5).reverse().filter(x=>!best.includes(x));
    const row=v=>{
      const col=v.pct>=55?'var(--win)':v.pct<=45?'var(--lose)':'var(--gold)';
      return `<div class="cd-dm-row">
        <span class="cd-dm-name">${v.cmd}</span>
        <span class="cd-dm-pct" style="color:${col}">${v.pct}%</span>
        <span class="cd-dm-rec">${v.ahead}–${v.behind}${v.ties?'–'+v.ties:''}</span>
        <span class="cd-dm-g">${v.games}${t('md_games_short')}</span>
      </div>`;
    };
    deckMatchupHtml=`
      <div class="cd-dm-cols">
        <div class="cd-dm-col">
          <div class="cd-dm-hd up">▲ ${t('cd_best_vs')}</div>
          ${best.map(row).join('')}
        </div>
        <div class="cd-dm-col">
          <div class="cd-dm-hd down">▼ ${t('cd_worst_vs')}</div>
          ${worst.length?worst.map(row).join(''):`<div class="cd-dm-empty">—</div>`}
        </div>
      </div>`;
  } else {
    deckMatchupHtml=`<div class="empty">${t('cd_no_matchups')}</div>`;
  }

  const extraStats=[];
  if(d.solRate!=null) extraStats.push(`${t('cd_solrate')}: <b>${d.solRate}%</b>`);
  if(d.avgSeat!=null) extraStats.push(`${t('cd_seat')}: <b>${d.avgSeat}</b>`);

  cont.innerHTML=`
    ${backBtn}
    <div class="cd-header">
      <div class="cd-topline" style="background:linear-gradient(90deg,${wrCol},var(--gold))"></div>
      <div class="cd-title-row">
        <h2 class="cd-name">${d.name}</h2>
        ${colorPips(d.name,16)}
        ${extraStats.length?`<div class="cd-extra">${extraStats.join(' &nbsp;·&nbsp; ')}</div>`:''}
      </div>
      <div class="cd-stats">${heroStats}</div>
      <div class="cd-pilotline">${t('cd_piloted_by')}: ${d.pilots.map(p=>`<span class="cd-pilot-chip">${p.player} <b>${p.games}</b></span>`).join('')}</div>
    </div>

    <div class="cd-grid2">
      <div class="cd-card">
        <div class="cd-card-hd">${t('cd_vs_players')}</div>
        <div class="cd-card-sub">${t('cd_vs_players_sub')}</div>
        <div class="cd-vp-list">${vsPlayerRows}</div>
      </div>
      <div class="cd-side">
        <div class="cd-mini best">
          <div class="cd-mini-l">${t('cd_best_vs')}</div>
          <div class="cd-mini-who">${bestP?bestP.player:'—'}</div>
          ${bestP?`<div class="cd-mini-d">${bestP.pct}% ${t('cd_ahead')} · ${bestP.ahead}–${bestP.behind}${bestP.ties?'–'+bestP.ties:''}</div>`:''}
        </div>
        <div class="cd-mini worst">
          <div class="cd-mini-l">${t('cd_worst_vs')}</div>
          <div class="cd-mini-who">${worstP?worstP.player:'—'}</div>
          ${worstP?`<div class="cd-mini-d">${worstP.pct}% ${t('cd_ahead')} · ${worstP.ahead}–${worstP.behind}${worstP.ties?'–'+worstP.ties:''}</div>`:''}
        </div>
        <div class="cd-card cd-finish-card">
          <div class="cd-card-hd">${t('cd_finish_spread')}</div>
          <div class="fd-bar" style="height:30px;margin-top:12px">${finBar}</div>
          <div class="fd-legend" style="margin-top:12px;border:none;padding:0;justify-content:flex-start">${finLegend}</div>
        </div>
      </div>
    </div>

    ${d.pilots.length>1?`<div class="cd-card" style="margin-top:18px">
      <div class="cd-card-hd">${t('cd_by_pilot')}</div>
      <div class="cd-pilot-list">${pilotRows}</div>
    </div>`:''}

    <div class="cd-card" style="margin-top:18px">
      <div class="cd-card-hd">${t('cd_deck_matchups')}</div>
      <div class="cd-card-sub">${t('cd_deck_matchups_sub',{min:CMD_MATCHUP_MIN})}</div>
      ${deckMatchupHtml}
    </div>
  `;
  $('#cdBack').addEventListener('click',closeCommanderDetail);
}



/* ===== player detail computation ===== */
function computePlayerDetail(playerName){
  const games=gamesForYear();
  let g=0,w=0,rs=0,rn=0, solWith=0,solSeats=0;
  const fin={1:0,2:0,3:0,4:0};
  const decks={};       // commander -> {g,w,rs}
  const vsPlayer={};    // opponent -> {g,ahead,behind,ties}
  const seat={};        // turn -> {g,w}
  for(const gm of games){
    const me=gm.seats.find(s=>s.player===playerName);
    if(!me) continue;
    g++; if(me.rank===1)w++; rs+=me.rank; rn++;
    if(me.rank>=1&&me.rank<=4)fin[me.rank]++;
    if(me.sol!=null){solSeats++; if(me.sol===1)solWith++;}
    if(me.turn){const st=seat[me.turn]||(seat[me.turn]={g:0,w:0}); st.g++; if(me.rank===1)st.w++;}
    const dk=decks[me.commander]||(decks[me.commander]={g:0,w:0,rs:0});
    dk.g++; if(me.rank===1)dk.w++; dk.rs+=me.rank;
    for(const o of gm.seats){
      if(o.player===playerName) continue;
      const vp=vsPlayer[o.player]||(vsPlayer[o.player]={g:0,ahead:0,behind:0,ties:0});
      vp.g++; if(me.rank<o.rank)vp.ahead++; else if(me.rank>o.rank)vp.behind++; else vp.ties++;
    }
  }
  if(g===0) return null;
  const deckArr=Object.entries(decks).map(([commander,d])=>({commander,games:d.g,wins:d.w,
    winrate:+(100*d.w/d.g).toFixed(1), avgrank:+(d.rs/d.g).toFixed(2)})).sort((a,b)=>b.games-a.games||b.winrate-a.winrate);
  const RIVAL_DISPLAY_MIN=15; // hide opponents faced fewer than this many times (too noisy)
  let vsArr=Object.entries(vsPlayer).map(([player,d])=>({player,games:d.g,ahead:d.ahead,behind:d.behind,ties:d.ties,
    pct:+(100*d.ahead/d.g).toFixed(0)})).sort((a,b)=>b.pct-a.pct||b.games-a.games);
  const vsArrFiltered=vsArr.filter(v=>v.games>=RIVAL_DISPLAY_MIN);
  // if filtering leaves nothing (e.g. a narrow date range), fall back to all so the section isn't empty
  vsArr = vsArrFiltered.length>=1 ? vsArrFiltered : vsArr;
  const seatArr=[1,2,3,4].map(t=>{const d=seat[t]||{g:0,w:0};return {seat:t,games:d.g,wins:d.w,wr:d.g?+(100*d.w/d.g).toFixed(0):null};}).filter(s=>s.games>0);
  // best seat (min 5 games to be meaningful)
  const seatEligible=seatArr.filter(s=>s.games>=5);
  const bestSeat=(seatEligible.length?seatEligible:seatArr).slice().sort((a,b)=>b.wr-a.wr)[0];

  // YEAR ON YEAR — always across ALL years (ignores current filter)
  const allYears=[...new Set(ALL_GAMES.map(gm=>gm.date&&gm.date.slice(0,4)).filter(Boolean))].sort();
  const yoy=allYears.map(y=>{
    let yg=0,yw=0,yrs=0; const yf={1:0,2:0};
    ALL_GAMES.filter(gm=>gm.date&&gm.date.slice(0,4)===y).forEach(gm=>{
      const me=gm.seats.find(s=>s.player===playerName);
      if(!me)return; yg++; if(me.rank===1)yw++; yrs+=me.rank;
      if(me.rank===1)yf[1]++; if(me.rank===2)yf[2]++;
    });
    return {year:y, games:yg, wins:yw,
      winrate: yg?+(100*yw/yg).toFixed(1):null,
      avgrank: yg?+(yrs/yg).toFixed(2):null,
      podium: yg?+(100*(yf[1]+yf[2])/yg).toFixed(0):null};
  }).filter(r=>r.games>0);

  return {
    name:playerName, games:g, wins:w, winrate:+(100*w/g).toFixed(1), avgrank:+(rs/rn).toFixed(2),
    fin, finTot:fin[1]+fin[2]+fin[3]+fin[4],
    solRate: solSeats?+(100*solWith/solSeats).toFixed(0):null,
    bestSeat, decks:deckArr, vsPlayer:vsArr, seats:seatArr, yoy
  };
}

/* ===== player detail rendering ===== */
function renderPlayerDetail(){
  if(!ppName)return;
  const d=computePlayerDetail(ppName);
  const cont=$('#playerDetail');
  const backBtn=`<button class="md-back" id="ppBack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>${t('pp_back')}</button>`;
  if(!d){
    cont.innerHTML=backBtn+`<div class="empty">${t('pp_no_year')}</div>`;
    $('#ppBack').addEventListener('click',closePlayerDetail); return;
  }
  const wrCol=wrColor(d.winrate);
  const col=playerColor(d.name);

  // hero stats
  const stats=[
    [t('pp_games'), d.games, ''],
    [t('pp_winrate'), d.winrate+'%', `color:${wrCol}`],
    [t('pp_avgfinish'), d.avgrank, ''],
    [t('pp_decks'), d.decks.length, ''],
  ];
  const heroStats=stats.map(s=>`<div class="cd-stat"><div class="cd-stat-v" style="${s[2]}">${s[1]}</div><div class="cd-stat-l">${s[0]}</div></div>`).join('');
  const extraStats=[];
  if(d.solRate!=null) extraStats.push(`${t('pp_solring')}: <b>${d.solRate}%</b>`);
  if(d.bestSeat) extraStats.push(`${t('pp_best_seat')}: <b>${t('pp_seat_label')} ${d.bestSeat.seat}</b> (${d.bestSeat.wr}%)`);

  // YEAR ON YEAR chart + table
  let yoyHtml='';
  if(d.yoy.length){
    // mini grouped bar chart: win rate per year
    const maxWr=Math.max(...d.yoy.map(y=>y.winrate||0),1);
    const bars=d.yoy.map(y=>{
      const h=(y.winrate||0)/maxWr*100;
      return `<div class="yoy-bar-col">
        <div class="yoy-bar-val">${y.winrate}%</div>
        <div class="yoy-bar-track"><div class="yoy-bar" style="height:${h}%;background:linear-gradient(180deg,${col},#2c6b3b)"></div></div>
        <div class="yoy-bar-yr">${y.year}</div>
        <div class="yoy-bar-sub">${y.games} ${t('pp_yoy_games').toLowerCase()}</div>
      </div>`;
    }).join('');
    const rows=d.yoy.map(y=>`<tr>
      <td class="yoy-yr">${y.year}</td>
      <td>${y.games}</td>
      <td>${y.wins}</td>
      <td><span style="color:${wrColor(y.winrate)};font-family:'Oswald';font-weight:600">${y.winrate}%</span></td>
      <td>${y.avgrank}</td>
      <td><span class="fc-podium">${y.podium}%</span></td>
    </tr>`).join('');
    yoyHtml=`
      <div class="section-head" style="margin-top:0;margin-bottom:14px"><h2 style="font-size:22px">${t('pp_yoy')}</h2><span class="hint">${t('pp_yoy_sub')}</span></div>
      <div class="pp-yoy-grid">
        <div class="cd-card"><div class="yoy-chart">${bars}</div></div>
        <div class="cd-card" style="padding:0;overflow:hidden">
          <table class="yoy-table">
            <thead><tr><th class="fc-l">${t('pp_yoy_year')}</th><th>${t('pp_yoy_games')}</th><th>${t('pp_yoy_wins')}</th><th>${t('pp_yoy_wr')}</th><th>${t('pp_yoy_avg')}</th><th>${t('pp_yoy_podium')}</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  // personal trend (rolling) — reuse SVG approach, single line
  const trend=computePlayerTrend(d.name);
  let trendHtml='';
  if(trend && trend.months.length>=2){
    const W=820,H=240,padL=40,padR=16,padT=16,padB=40;
    const plotW=W-padL-padR, plotH=H-padT-padB;
    const n=trend.months.length;
    const xAt=i=> padL+(n<=1?plotW/2:(i/(n-1))*plotW);
    const axP=niceAxis(trend.series.filter(v=>v!=null));
    const yAt=v=> padT+(1-(v-axP.lo)/(axP.hi-axP.lo))*plotH;
    let grid='';
    axP.ticks.forEach(v=>{const y=yAt(v);
      grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-width="1" ${v===axP.lo?'':'stroke-dasharray="2 4"'}/>`;
      grid+=`<text x="${padL-7}" y="${y+4}" text-anchor="end" fill="var(--ink3)" font-size="10" font-family="JetBrains Mono">${v}%</text>`;});
    let xl='';const step=Math.max(1,Math.ceil(n/6));
    for(let i=0;i<n;i+=step){const m=trend.months[i];const[y,mo]=m.split('-');
      xl+=`<text x="${xAt(i)}" y="${H-padB+18}" text-anchor="middle" fill="var(--ink3)" font-size="10" font-family="JetBrains Mono">${new Date(y,mo-1).toLocaleString(lang,{month:'short',year:'2-digit'})}</text>`;}
    const pts=trend.series.map((v,i)=>({v,i})).filter(o=>o.v!=null);
    let path='';
    if(pts.length>=2){pts.forEach((o,k)=>{path+=(k===0?'M':'L')+xAt(o.i)+' '+yAt(o.v);});}
    const line=pts.length>=2?`<path d="${path}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${xAt(pts[pts.length-1].i)}" cy="${yAt(pts[pts.length-1].v)}" r="3.5" fill="${col}"/>`:'';
    trendHtml=`
      <div class="section-head" style="margin-bottom:14px"><h2 style="font-size:22px">${t('pp_trend')}</h2><span class="hint">${t('pp_trend_sub')}</span></div>
      <div class="cd-card"><svg viewBox="0 0 ${W} ${H}" class="trend-svg" preserveAspectRatio="xMidYMid meet">${grid}${line}${xl}</svg></div>`;
  }

  // finish spread
  const segColors={1:'var(--gold)',2:'#9aa97f',3:'#6b7d6f',4:'#3a4a40'};
  const segLabels={1:t('finish_1st'),2:t('finish_2nd'),3:t('finish_3rd'),4:t('finish_4th')};
  const finBar=[1,2,3,4].map(r=>{const pct=d.finTot?100*d.fin[r]/d.finTot:0;if(pct<=0)return'';
    return `<div class="fd-seg" style="width:${pct}%;background:${segColors[r]}" title="${segLabels[r]}: ${d.fin[r]}">${pct>=10?Math.round(pct)+'%':''}</div>`;}).join('');
  const finLegend=[1,2,3,4].map(r=>`<span class="fd-leg-item"><span class="fd-leg-sw" style="background:${segColors[r]}"></span>${segLabels[r]} <b style="color:var(--ink2)">${d.fin[r]}</b></span>`).join('');

  // rivalries (clickable into H2H detail)
  const rivalRows=d.vsPlayer.map(v=>{
    const c=v.pct>=55?'var(--win)':v.pct<=45?'var(--lose)':'var(--gold)';
    return `<div class="cd-vp-row pp-rival-row" data-opp="${v.player}" role="button" tabindex="0">
      <span class="cd-vp-name">${v.player}</span>
      <div class="cd-vp-track"><div class="cd-vp-fill" style="width:${v.pct}%;background:${c}"></div></div>
      <span class="cd-vp-pct" style="color:${c}">${v.pct}%</span>
      <span class="cd-vp-rec">${v.ahead}–${v.behind}${v.ties?'–'+v.ties:''}</span>
      <span class="chev" style="font-size:18px;color:var(--ink3);padding-left:2px">›</span>
    </div>`;
  }).join('');
  const bestR=d.vsPlayer[0], worstR=d.vsPlayer[d.vsPlayer.length-1];

  // seat performance bars
  const maxSeatWr=Math.max(...d.seats.map(s=>s.wr||0),1);
  const seatBars=d.seats.map(s=>{
    const h=(s.wr||0)/maxSeatWr*100;
    return `<div class="vbar-col">
      <div class="vbar-val">${s.wr}%</div>
      <div class="vbar-track"><div class="vbar" style="height:${h}%;background:linear-gradient(180deg,${s.seat===d.bestSeat.seat?'var(--gold)':'var(--G)'},#2c6b3b)"></div></div>
      <div class="vbar-lbl">${t('pp_seat_label')} ${s.seat}</div>
      <div class="vbar-sub">${s.games} ${t('cd_games').toLowerCase()}</div>
    </div>`;
  }).join('');

  // decks (clickable into commander detail)
  const deckCards=d.decks.map(dk=>`
    <div class="cmd cmd-clickable" data-cmd="${dk.commander.replace(/"/g,'&quot;')}"><div class="topline"></div><div class="cname">${dk.commander}</div>
      <div class="row"><span class="k">${t('pc_games')}</span><span class="v">${dk.games}</span></div>
      <div class="row"><span class="k">${t('pc_wins')}</span><span class="v">${dk.wins}</span></div>
      <div class="wrbar"><i style="width:${Math.max(dk.winrate,2)}%;background:${wrColor(dk.winrate)}"></i></div>
      <div class="row" style="margin-bottom:0"><span class="k">${t('pc_wr_finish')}</span><span class="v"><span style="color:${wrColor(dk.winrate)}">${dk.winrate}%</span> <span class="muted" style="font-size:13px">· ${dk.avgrank??'—'}</span></span></div>
    </div>`).join('');

  cont.innerHTML=`
    ${backBtn}
    <div class="cd-header">
      <div class="cd-topline" style="background:linear-gradient(90deg,${col},var(--gold))"></div>
      <div class="cd-title-row">
        <h2 class="cd-name">${d.name}</h2>
        ${extraStats.length?`<div class="cd-extra">${extraStats.join(' &nbsp;·&nbsp; ')}</div>`:''}
      </div>
      <div class="cd-stats">${heroStats}</div>
    </div>

    ${yoyHtml}

    <div class="pp-two-col" style="margin-top:18px">
      ${trendHtml?`<div class="pp-col-main">${trendHtml}</div>`:''}
      <div class="pp-col-side">
        <div class="section-head" style="margin-bottom:14px"><h2 style="font-size:22px">${t('pp_finish')}</h2></div>
        <div class="cd-card">
          <div class="fd-bar" style="height:30px">${finBar}</div>
          <div class="fd-legend" style="margin-top:12px;border:none;padding:0;justify-content:flex-start">${finLegend}</div>
        </div>
      </div>

/* personal win-rate trend (rolling 3-month) for one player, current year subset */
function computePlayerTrend(playerName){
  const games=gamesForYear().filter(g=>g.date).sort((a,b)=>a.date<b.date?-1:1);
  if(!games.length) return null;
  const months=[...new Set(games.map(g=>g.date.slice(0,7)))].sort();
  if(months.length<2) return null;
  const series=months.map((m,i)=>{
    const window=months.slice(Math.max(0,i-2),i+1);
    let wg=0,ww=0;
    games.filter(g=>window.includes(g.date.slice(0,7))).forEach(g=>{
      const me=g.seats.find(s=>s.player===playerName);
      if(me){wg++; if(me.rank===1)ww++;}
    });
    return wg>=3?Math.round(100*ww/wg):null;
  });
  return {months, series};
}

/* ===== chart data computations (use current year subset) ===== */

/* Compute a tidy y-axis range from the actual plotted values so the chart
   fills the vertical space instead of always spanning 0-100%. Returns
   {lo, hi, ticks:[...]} with gridlines at nice round numbers. */
function niceAxis(values){
  const vals = values.filter(v=>v!=null && !isNaN(v));
  if(!vals.length) return {lo:0, hi:100, ticks:[0,25,50,75,100]};
  let mn=Math.min(...vals), mx=Math.max(...vals);
  if(mn===mx){ mn=Math.max(0,mn-10); mx=Math.min(100,mx+10); } // flat line -> give it room
  const span=mx-mn;
  const pad=Math.max(4, span*0.15);            // ~15% headroom each side
  let lo=Math.max(0, mn-pad);
  let hi=Math.min(100, mx+pad);
  // round outward to a clean step
  const step = span<=20 ? 5 : 10;
  lo=Math.floor(lo/step)*step;
  hi=Math.ceil(hi/step)*step;
  if(hi-lo<step) hi=lo+step;                    // guarantee at least one interval
  if(hi>100) hi=100;
  if(lo<0) lo=0;
  // build ticks
  const ticks=[];
  for(let v=lo; v<=hi+0.001; v+=step) ticks.push(Math.round(v));
  return {lo, hi, ticks};
}

const PLAYER_COLORS = ['#d9b25a','#3f9b54','#3a7bd5','#d6442f','#7a5b8c','#c98a3a','#5bbf8a'];
// Stable color per player: assigned once from the full all-time roster (sorted by total
// games desc) so a player's color never changes when the year/date filter changes.
let PLAYER_COLOR_MAP=null;
function buildPlayerColorMap(){
  const totals={};
  (ALL_GAMES||[]).forEach(g=>g.seats.forEach(s=>{ totals[s.player]=(totals[s.player]||0)+1; }));
  const ordered=Object.keys(totals).sort((a,b)=> totals[b]-totals[a] || a.localeCompare(b));
  PLAYER_COLOR_MAP={};
  ordered.forEach((p,i)=>{ PLAYER_COLOR_MAP[p]=PLAYER_COLORS[i % PLAYER_COLORS.length]; });
}
function playerColor(name){
  if(!PLAYER_COLOR_MAP) buildPlayerColorMap();
  return (PLAYER_COLOR_MAP && PLAYER_COLOR_MAP[name]) || PLAYER_COLORS[0];
}

function computeTrend(mode){ // mode: 'rolling' | 'career'
  const games = gamesForYear().filter(g=>g.date).sort((a,b)=>a.date<b.date?-1:1);
  if(!games.length) return null;
  const months=[...new Set(games.map(g=>g.date.slice(0,7)))].sort();
  if(months.length<2) return null;
  const players=CORE.slice();
  const series={};
  players.forEach(p=>series[p]=[]);
  if(mode==='career'){
    const cum={}; players.forEach(p=>cum[p]={g:0,w:0});
    months.forEach(m=>{
      games.filter(g=>g.date.slice(0,7)===m).forEach(g=>g.seats.forEach(s=>{
        if(cum[s.player]){cum[s.player].g++; if(s.rank===1)cum[s.player].w++;}}));
      players.forEach(p=>{const d=cum[p]; series[p].push(d.g?Math.round(100*d.w/d.g):null);});
    });
  } else {
    months.forEach((m,i)=>{
      const window=months.slice(Math.max(0,i-2),i+1);
      const acc={}; players.forEach(p=>acc[p]={g:0,w:0});
      games.filter(g=>window.includes(g.date.slice(0,7))).forEach(g=>g.seats.forEach(s=>{
        if(acc[s.player]){acc[s.player].g++; if(s.rank===1)acc[s.player].w++;}}));
      players.forEach(p=>{const d=acc[p]; series[p].push(d.g>=3?Math.round(100*d.w/d.g):null);});
    });
  }
  return {months, players, series};
}

function computeFinishDist(){
  const games=gamesForYear();
  const fin={};
  games.forEach(g=>g.seats.forEach(s=>{
    fin[s.player]=fin[s.player]||{1:0,2:0,3:0,4:0,tot:0};
    if(s.rank>=1&&s.rank<=4){fin[s.player][s.rank]++; fin[s.player].tot++;}
  }));
  return CORE.map(p=>{const d=fin[p]||{1:0,2:0,3:0,4:0,tot:0};
    return {player:p, c1:d[1],c2:d[2],c3:d[3],c4:d[4],tot:d.tot,
      p1:d.tot?100*d[1]/d.tot:0,p2:d.tot?100*d[2]/d.tot:0,p3:d.tot?100*d[3]/d.tot:0,p4:d.tot?100*d[4]/d.tot:0};
  }).filter(x=>x.tot>0);
}

function computeTurnOrder(){
  const games=gamesForYear();
  const turn={};
  let total=0;
  games.forEach(g=>g.seats.forEach(s=>{if(s.turn){turn[s.turn]=turn[s.turn]||{g:0,w:0};turn[s.turn].g++;if(s.rank===1)turn[s.turn].w++;total++;}}));
  const rows=[1,2,3,4].map(seat=>{const d=turn[seat]||{g:0,w:0};
    return {seat, games:d.g, wins:d.w, wr:d.g?+(100*d.w/d.g).toFixed(1):0};}).filter(r=>r.games>0);
  return {rows, total};
}

function computeSolRing(){
  const games=gamesForYear();
  let w1={g:0,w:0}, w0={g:0,w:0};
  games.forEach(g=>g.seats.forEach(s=>{
    if(s.sol===1){w1.g++; if(s.rank===1)w1.w++;}
    else if(s.sol===0){w0.g++; if(s.rank===1)w0.w++;}
  }));
  const totSeats=w1.g+w0.g;
  return {
    withWr: w1.g?+(100*w1.w/w1.g).toFixed(1):0, withG:w1.g,
    withoutWr: w0.g?+(100*w0.w/w0.g).toFixed(1):0, withoutG:w0.g,
    rate: totSeats?+(100*w1.g/totSeats).toFixed(1):0,
    hasData: totSeats>0
  };
}


/* ===== chart rendering (SVG, no libraries) ===== */
let trendMode='rolling';

function renderTrends(){
  // toggle buttons state + hints
  document.querySelectorAll('#trendToggle button').forEach(b=>b.classList.toggle('on',b.dataset.tm===trendMode));
  const hint=$('#trendHint'); if(hint) hint.textContent = trendMode==='rolling'?t('trend_rolling_hint'):t('trend_career_hint');

  const data=computeTrend(trendMode);
  const host=$('#trendChart');
  if(!data){host.innerHTML=`<div class="empty">${t('trend_no_data')}</div>`; renderTrendLegend(null); return;}

  const W=860, H=380, padL=44, padR=20, padT=20, padB=54;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n=data.months.length;
  const xAt=i=> padL + (n<=1?plotW/2:(i/(n-1))*plotW);
  // auto-scale the y-axis to the data so lines fill the chart
  const allVals=[]; data.players.forEach(p=>data.series[p].forEach(v=>{ if(v!=null) allVals.push(v); }));
  const ax=niceAxis(allVals);
  const yAt=v=> padT + (1-(v-ax.lo)/(ax.hi-ax.lo))*plotH;

  let grid='';
  ax.ticks.forEach(v=>{
    const y=yAt(v);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-width="1" ${v===ax.lo?'':'stroke-dasharray="2 4"'}/>`;
    grid+=`<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="var(--ink3)" font-size="11" font-family="JetBrains Mono">${v}%</text>`;
  });

  // x labels (show ~6 evenly)
  let xlabels='';
  const step=Math.max(1,Math.ceil(n/6));
  for(let i=0;i<n;i+=step){
    const m=data.months[i]; const [y,mo]=m.split('-');
    const lbl=new Date(y,mo-1).toLocaleString(lang,{month:'short',year:'2-digit'});
    xlabels+=`<text x="${xAt(i)}" y="${H-padB+20}" text-anchor="middle" fill="var(--ink3)" font-size="10.5" font-family="JetBrains Mono">${lbl}</text>`;
  }

  // lines per player (skip null gaps)
  let paths='';
  data.players.forEach(p=>{
    const col=playerColor(p);
    const pts=data.series[p].map((v,i)=>({v,i})).filter(o=>o.v!=null);
    if(pts.length<2) return;
    let d='';
    pts.forEach((o,k)=>{ d+=(k===0?'M':'L')+xAt(o.i)+' '+yAt(o.v); });
    paths+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.92"/>`;
    // end dot
    const last=pts[pts.length-1];
    paths+=`<circle cx="${xAt(last.i)}" cy="${yAt(last.v)}" r="3.5" fill="${col}"/>`;
  });

  host.innerHTML=`<svg viewBox="0 0 ${W} ${H}" class="trend-svg" preserveAspectRatio="xMidYMid meet">${grid}${paths}${xlabels}</svg>`;
  renderTrendLegend(data.players);
}
function renderTrendLegend(players){

  host.innerHTML=players.map(p=>{

    return `<span class="tl-item"><span class="tl-dot" style="background:${playerColor(p)}"></span>${p} <span class="tl-pct">${s?s.winrate+'%':''}</span></span>`;

let fcSort={k:'p1',dir:-1}; // default sort by 1st place desc (use percent for podium too)
function renderFinishCounts(){
  const host=document.getElementById('finishChart2');
  if(!host)return;
  const data=computeFinishDist();
  if(!data.length){host.innerHTML=`<div class="empty">—</div>`;return;}
  // add podium % (top-2)
  data.forEach(d=>{ d.podium = d.tot ? +(100*(d.c1+d.c2)/d.tot).toFixed(1) : 0; });
  const rows=[...data].sort((a,b)=>{
    let x,y;
    if(fcSort.k==='player'){return fcSort.dir*a.player.localeCompare(b.player);}
    if(fcSort.k==='tot'){x=a.tot;y=b.tot;}
    else if(fcSort.k==='podium'){x=a.podium;y=b.podium;}
    else if(fcSort.k==='c1'){x=a.c1;y=b.c1;}
    else if(fcSort.k==='c2'){x=a.c2;y=b.c2;}
    else if(fcSort.k==='c3'){x=a.c3;y=b.c3;}
    else if(fcSort.k==='c4'){x=a.c4;y=b.c4;}
    else {x=a.p1;y=b.p1;}
    return fcSort.dir*((x??-1)-(y??-1));
  });
  const arrow=k=> fcSort.k===k ? (fcSort.dir===-1?' ▼':' ▲') : '';
  const cols=[['player',t('fc_player'),'l'],['tot',t('fc_games'),'r'],['c1',t('fc_1st'),'r'],['c2',t('fc_2nd'),'r'],['c3',t('fc_3rd'),'r'],['c4',t('fc_4th'),'r'],['podium',t('fc_podium'),'r']];
  let head='<tr>'+cols.map(c=>`<th data-fk="${c[0]}" class="fc-th ${c[2]==='l'?'fc-l':''}">${c[1]}${arrow(c[0])}</th>`).join('')+'</tr>';
  let body=rows.map((d,i)=>{

    return `<tr>
      <td class="fc-name"><span class="rank-badge ${i===0&&fcSort.k==='p1'&&fcSort.dir===-1?'top':''}">${i+1}</span>${d.player}</td>

      <td>${d.c4}</td>
      <td><span class="fc-podium">${d.podium}%</span></td>
    </tr>`;
  }).join('');
  host.innerHTML=`<table class="fc-table"><thead>${head}</thead><tbody>${body}</tbody></table>
    <div class="fc-foot">${t('fc_podium')} = ${t('fc_podium_hint')}</div>`;

    if(fcSort.k===k)fcSort.dir*=-1; else fcSort={k,dir:k==='player'?1:-1};
    renderFinishCounts();

}

/* ===== matchup detail (deck-by-deck) ===== */
function computeMatchupDetail(pA, pB){
  const games = gamesForYear();
  const hh={games:0,aAhead:0,bAhead:0,ties:0};
  const cmdPairs={}, aCmds={}, bCmds={};
  for(const g of games){
    const sa=g.seats.find(s=>s.player===pA);
    const sb=g.seats.find(s=>s.player===pB);
    if(!sa||!sb) continue;
    hh.games++;
    if(sa.rank<sb.rank)hh.aAhead++; else if(sa.rank>sb.rank)hh.bAhead++; else hh.ties++;
    const key=sa.commander+'|||'+sb.commander;
    const cp=cmdPairs[key]||(cmdPairs[key]={aCmd:sa.commander,bCmd:sb.commander,games:0,aAhead:0,bAhead:0,ties:0});
    cp.games++; if(sa.rank<sb.rank)cp.aAhead++; else if(sa.rank>sb.rank)cp.bAhead++; else cp.ties++;
    const ac=aCmds[sa.commander]||(aCmds[sa.commander]={cmd:sa.commander,games:0,ahead:0,behind:0,ties:0});
    ac.games++; if(sa.rank<sb.rank)ac.ahead++; else if(sa.rank>sb.rank)ac.behind++; else ac.ties++;
    const bc=bCmds[sb.commander]||(bCmds[sb.commander]={cmd:sb.commander,games:0,ahead:0,behind:0,ties:0});
    bc.games++; if(sb.rank<sa.rank)bc.ahead++; else if(sb.rank>sa.rank)bc.behind++; else bc.ties++;
  }
  return {
    hh,
    cmdPairs:Object.values(cmdPairs).sort((a,b)=>b.games-a.games||(b.aAhead-b.bAhead)-(a.aAhead-a.bAhead)),
    aCmds:Object.values(aCmds).sort((a,b)=>b.games-a.games),
    bCmds:Object.values(bCmds).sort((a,b)=>b.games-a.games)
  };
}

function renderMatchupDetail(){
  if(!mdPair)return;
  const {a,b}=mdPair;
  const d=computeMatchupDetail(a,b);
  const cont=$('#matchupDetail');
  if(d.hh.games===0){
    const yr = curYear==='all' ? '' : ' ('+curYear+')';
    cont.innerHTML = `<button class="md-back" id="mdBack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>${t('md_back')}</button>
      <div class="empty">${t('md_no_data',{yr:yr})}</div>`;
    $('#mdBack').addEventListener('click',closeMatchupDetail);
    return;
  }
  const aPct=Math.round(100*d.hh.aAhead/d.hh.games);
  const bPct=Math.round(100*d.hh.bAhead/d.hh.games);
  const aWins=d.hh.aAhead>d.hh.bAhead, bWins=d.hh.bAhead>d.hh.aAhead;
  const aCol=aPct>=55?'var(--win)':aPct<=45?'var(--lose)':'var(--gold)';
  const bCol=bPct>=55?'var(--win)':bPct<=45?'var(--lose)':'var(--gold)';

  function deckRows(decks,col){
    return decks.map(c=>{
      const tot=c.ahead+c.behind+c.ties;
      const pct=tot?Math.round(100*c.ahead/tot):0;
      const pc=pct>=55?'var(--win)':pct<=45?'var(--lose)':'var(--gold)';
      return `<div class="md-deck-row">
        <span class="dname">${c.cmd}</span>
        <span class="dstat">
          <span class="drec">${c.ahead}–${c.behind}${c.ties?'–'+c.ties:''}</span>
          <span class="dbar"><i style="width:${Math.max(pct,3)}%;background:${pc}"></i></span>
          <span class="dpct" style="color:${pc}">${pct}%</span>
        </span></div>`;
    }).join('');
  }

  const pairRows=d.cmdPairs.map(cp=>{
    const verdict = cp.aAhead>cp.bAhead ? `${a} ${t('md_ahead')}` : cp.bAhead>cp.aAhead ? `${b} ${t('md_ahead')}` : t('h2h_even');
    const vcol = cp.aAhead>cp.bAhead ? 'var(--win)' : cp.bAhead>cp.aAhead ? 'var(--lose)' : 'var(--gold)';
    return `<div class="md-pair-row">
      <div class="matchup-cmds">
        <span class="ca">${cp.aCmd}</span>
        <span class="vsmini">${t('md_vs')}</span>
        <span class="cb">${cp.bCmd}</span>
      </div>
      <span class="presult" style="color:${vcol}">${cp.aAhead}–${cp.bAhead}${cp.ties?'–'+cp.ties:''}</span>
      <span class="pgames">${cp.games} ${t('md_games_short')}</span>
    </div>`;
  }).join('');

  cont.innerHTML = `
    <button class="md-back" id="mdBack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>${t('md_back')}</button>
    <div class="section-head"><h2>${t('md_title')}</h2></div>
    <div class="md-hero">
      <div class="md-player ${aWins?'winner':''}">
        <div class="topband" style="background:${aCol}"></div>
        <div class="pn">${a}</div>
        <div class="bigpct" style="color:${aCol}">${aPct}<span class="u">%</span></div>
        <div class="sublabel">${t('md_finishes_ahead')}</div>
        <div class="winrec">${d.hh.aAhead}–${d.hh.bAhead}${d.hh.ties?'–'+d.hh.ties:''}</div>
      </div>
      <div class="md-center">
        <div class="vs">${t('md_vs').toUpperCase()}</div>
        <div class="gcount">${d.hh.games} ${t('h2h_shared')}</div>
        ${d.hh.ties?`<div class="ties">${d.hh.ties} ${t('h2h_even').toLowerCase()}</div>`:''}
      </div>
      <div class="md-player ${bWins?'winner':''}">
        <div class="topband" style="background:${bCol}"></div>
        <div class="pn">${b}</div>
        <div class="bigpct" style="color:${bCol}">${bPct}<span class="u">%</span></div>
        <div class="sublabel">${t('md_finishes_ahead')}</div>
        <div class="winrec">${d.hh.bAhead}–${d.hh.aAhead}${d.hh.ties?'–'+d.hh.ties:''}</div>
      </div>
    </div>
    <div class="md-summary-line">${t('h2h_summary',{games:d.hh.games,a:`<b>${a}</b>`,b:`<b>${b}</b>`,pct:aPct})}</div>
    <div class="md-decks-grid">
      <div class="md-deck-col">
        <div class="colhd"><span class="dot" style="background:${aCol}"></span>${t('md_a_decks',{name:a})}</div>
        ${deckRows(d.aCmds,aCol)}
      </div>
      <div class="md-deck-col">
        <div class="colhd"><span class="dot" style="background:${bCol}"></span>${t('md_b_decks',{name:b})}</div>
        ${deckRows(d.bCmds,bCol)}
      </div>
    </div>
    <div class="md-pairs">
      <div class="ph"><div class="t">${t('md_deck_duels')}</div><div class="s">${t('md_deck_duels_sub')}</div></div>
      ${pairRows}
    </div>
  `;
  $('#mdBack').addEventListener('click',closeMatchupDetail);
}

/* ===== UI wiring ===== */
function buildLangSel(){
  $('#langSel').innerHTML=LANGS.map(l=>`<button data-l="${l}">${I18N[l]._label}</button>`).join('');
  $('#langSel').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    lang=b.dataset.l;localStorage.setItem('edh_lang',lang);applyStaticI18n();if(ALL_MONTHS.length)buildYearSel();if(S)rebuild();});
}
function monthLabel(ym){ const [y,m]=ym.split('-'); return new Date(y,+m-1).toLocaleString(lang,{month:'short',year:'numeric'}); }
function buildYearSel(){
  const opts=[['all',t('year_all')]].concat(YEARS.map(y=>[y,String(y)]));
  const customActive = !!customRange;
  let html = opts.map(([v,lbl])=>`<button data-y="${v}" class="${!customActive&&String(v)===String(curYear)?'on':''}">${lbl}</button>`).join('');
  html += `<button data-y="__custom" class="yr-custom ${customActive?'on':''}">${t('year_custom')}</button>`;
  $('#yearSel').innerHTML = html;
  buildRangePanel();
}
function buildRangePanel(){
  const panel=$('#rangePanel'); if(!panel) return;
  const f = customRange ? customRange.from : (ALL_MONTHS[0]||'');
  const to = customRange ? customRange.to : (ALL_MONTHS[ALL_MONTHS.length-1]||'');
  const optsFrom = ALL_MONTHS.map(m=>`<option value="${m}" ${m===f?'selected':''}>${monthLabel(m)}</option>`).join('');
  const optsTo = ALL_MONTHS.map(m=>`<option value="${m}" ${m===to?'selected':''}>${monthLabel(m)}</option>`).join('');
  panel.innerHTML = `
    <div class="rp-row">
      <label class="rp-lbl">${t('date_from')}</label>
      <select id="rpFrom" class="rp-sel">${optsFrom}</select>
    </div>
    <div class="rp-row">
      <label class="rp-lbl">${t('date_to')}</label>
      <select id="rpTo" class="rp-sel">${optsTo}</select>
    </div>
    <div class="rp-actions">
      <button class="rp-clear" id="rpClear">${t('date_clear')}</button>
      <button class="rp-apply" id="rpApply">${t('date_apply')}</button>
    </div>`;
  $('#rpApply').addEventListener('click',()=>{
    let from=$('#rpFrom').value, to=$('#rpTo').value;
    if(from>to){ const tmp=from; from=to; to=tmp; } // swap if reversed
    customRange={from,to};
    closeRangePanel();
    buildYearSel();
    recentShown=RECENT_STEP;
    rebuild();
  });
  $('#rpClear').addEventListener('click',()=>{
    customRange=null;
    closeRangePanel();
    buildYearSel();
    recentShown=RECENT_STEP;
    rebuild();
  });
}
function openRangePanel(){ const p=$('#rangePanel'); if(p){ buildRangePanel(); p.classList.add('on'); } }
function closeRangePanel(){ const p=$('#rangePanel'); if(p) p.classList.remove('on'); }
function refreshYearLabels(){
  // re-label the "All Time" button when language changes
  const allBtn=$('#yearSel button[data-y="all"]'); if(allBtn) allBtn.textContent=t('year_all');
}

$('#tabs').addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;
  if(mdPair)closeMatchupDetail();
  if(cdName)closeCommanderDetail();
  if(ppName)closePlayerDetail();
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  b.classList.add('active');$('#'+b.dataset.v).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});});
$('#yearSel').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  if(b.dataset.y==='__custom'){
    const p=$('#rangePanel');
    if(p&&p.classList.contains('on')) closeRangePanel(); else openRangePanel();
    return;
  }
  // a normal year button clears any custom range
  customRange=null;
  curYear=b.dataset.y;
  closeRangePanel();
  buildYearSel();
  recentShown=RECENT_STEP;
  rebuild();
});
// close range panel when clicking outside it
document.addEventListener('click',e=>{
  const p=$('#rangePanel'); if(!p||!p.classList.contains('on'))return;
  if(p.contains(e.target)||e.target.closest('[data-y="__custom"]'))return;
  closeRangePanel();
});
document.querySelectorAll('#lbTable th.sortable').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k;if(lbSort.k===k)lbSort.dir*=-1;else lbSort={k,dir:k==='name'||k==='avgrank'?1:-1};renderLB();}));
$('#h2hToggle').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;h2hMode=b.dataset.mode;renderH2H();});
$('#h2hPick').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;h2hPlayer=b.dataset.p;renderH2H();});
$('#cmdSort').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  $('#cmdSort').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cmdState.sort=b.dataset.s;renderCmd();});
$('#cmdMin').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
  $('#cmdMin').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  cmdState.min=+b.dataset.m;
  const cw=$('#cmdCustomWrap'); if(cw)cw.classList.remove('active');
  const ci=$('#cmdCustomInput'); if(ci)ci.value='';
  renderCmd();});
// custom min-games free text
(function(){
  const ci=$('#cmdCustomInput'); const cw=$('#cmdCustomWrap');
  if(!ci)return;
  ci.addEventListener('input',()=>{
    let v=parseInt(ci.value,10);
    if(ci.value.trim()==='' || isNaN(v) || v<1){
      // empty -> revert to All
      cw.classList.remove('active');
      $('#cmdMin').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x.dataset.m==='1'));
      cmdState.min=1;
    }else{
      cw.classList.add('active');
      $('#cmdMin').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      cmdState.min=v;
    }
    renderCmd();
  });
})();
$('#cmdSearch').addEventListener('input',e=>{cmdState.q=e.target.value;renderCmd();});
/* By Player tab removed — playerPick wiring deleted */
const trendToggleEl=$('#trendToggle');
if(trendToggleEl)trendToggleEl.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;trendMode=b.dataset.tm;renderTrends();});
$('#refreshBtn').addEventListener('click',load);
$('#retryBtn').addEventListener('click',load);
(function(){ const mb=$('#rgMore'); if(mb) mb.addEventListener('click',()=>{ recentShown+=RECENT_STEP; renderRecent(); }); })();

/* ===== load ===== */
async function load(){
  buildLangSel();applyStaticI18n();
  $('#app').style.display='none';$('#error').style.display='none';$('#loading').style.display='flex';
  if(!SHEET_CSV_URL||SHEET_CSV_URL.includes('PASTE_YOUR')){
    $('#loading').style.display='none';$('#error').style.display='flex';
    $('#errMsg').textContent='';return;
  }
  try{
    const res=await fetch(SHEET_CSV_URL,{cache:'no-store'});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    if(/<html/i.test(text.slice(0,200)))throw new Error("Got HTML, not CSV — check the published link format.");
    ALL_GAMES=parseGames(text);
    buildPlayerColorMap();
    // optional: commander colors from the second tab (never fatal)
    COMMANDER_COLORS={}; COMMANDER_COLOR_INDEX={};
    const cu=colorsCsvUrl();
    if(cu){
      try{
        const cres=await fetch(cu,{cache:'no-store'});
        if(cres.ok){
          const ctext=await cres.text();
          if(!/<html/i.test(ctext.slice(0,200))){
            const parsed=parseColors(ctext);
            COMMANDER_COLORS=parsed.map; COMMANDER_COLOR_INDEX=parsed.index;
          }
        }
      }catch(ce){ console.warn('Colors sheet not loaded:', ce); }
    }
    YEARS=[...new Set(ALL_GAMES.map(g=>g.date&&g.date.slice(0,4)).filter(Boolean))].sort();
    ALL_MONTHS=[...new Set(ALL_GAMES.map(g=>g.date&&g.date.slice(0,7)).filter(Boolean))].sort();
    curYear = YEARS.includes(DEFAULT_YEAR) ? DEFAULT_YEAR : 'all';
    customRange=null;
    buildYearSel();
    $('#footSrc').textContent=SHEET_CSV_URL;
    $('#loading').style.display='none';$('#app').style.display='block';
    rebuild();
  }catch(err){
    $('#loading').style.display='none';$('#error').style.display='flex';
    $('#errMsg').textContent=(err&&err.message)?err.message:String(err);
    console.error(err);
  }
}

load();


</script>
