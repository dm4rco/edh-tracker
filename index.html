<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commander League — Live Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>


:root{
  --felt:#0d1410; --felt2:#121e18; --panel:#16241d; --panel2:#1b2c23;
  --line:#2a4035; --line2:#37574a;
  --ink:#eef3ef; --ink2:#b9c7bf; --ink3:#7d9286;
  --gold:#d9b25a; --gold2:#f0cd7e;
  --W:#f7f3e3; --U:#3a7bd5; --B:#7a5b8c; --R:#d6442f; --G:#3f9b54;
  --win:#3f9b54; --lose:#d6442f; --mid:#d9b25a;
  --radius:14px; --shadow:0 8px 30px rgba(0,0,0,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;
  background:radial-gradient(1200px 600px at 80% -10%,#1a2c22 0%,transparent 60%),radial-gradient(900px 500px at 10% 110%,#16241d 0%,transparent 55%),var(--felt);
  color:var(--ink);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1440px;margin:0 auto;padding:0 32px}
::selection{background:var(--gold);color:#1a1209}

/* top utility bar */
.utilbar{position:relative;z-index:3;display:flex;justify-content:flex-end;gap:10px;padding:14px 0 0}
.langsel{display:flex;background:rgba(22,36,29,.6);border:1px solid var(--line);border-radius:9px;padding:3px;backdrop-filter:blur(8px)}
.langsel button{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--ink3);background:none;border:none;padding:6px 11px;border-radius:6px;cursor:pointer;transition:.15s}
.langsel button:hover{color:var(--ink)}
.langsel button.on{background:var(--gold);color:#1a1209}

header{position:relative;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(13,20,16,.2),rgba(13,20,16,.7))}
.header-clip{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.mana-ring{position:absolute;top:-160px;right:-120px;width:520px;height:520px;border-radius:50%;opacity:.16;pointer-events:none;
  background:conic-gradient(var(--W) 0deg 72deg,var(--U) 72deg 144deg,var(--B) 144deg 216deg,var(--R) 216deg 288deg,var(--G) 288deg 360deg);filter:blur(2px);
  -webkit-mask:radial-gradient(circle,transparent 38%,#000 39%,#000 60%,transparent 61%);mask:radial-gradient(circle,transparent 38%,#000 39%,#000 60%,transparent 61%);
  animation:spin 80s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hero-inner{position:relative;padding:22px 0 20px;z-index:60}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:12px}
.eyebrow::before{content:"";width:34px;height:1px;background:var(--gold);display:inline-block}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--G);animation:pulse 2s infinite;margin-left:4px}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,155,84,.5)}70%{box-shadow:0 0 0 8px rgba(63,155,84,0)}100%{box-shadow:0 0 0 0 rgba(63,155,84,0)}}
h1{font-family:'Oswald',sans-serif;font-weight:600;font-size:clamp(34px,4.6vw,58px);line-height:.98;letter-spacing:-.01em;text-transform:uppercase}
h1 .thin{font-weight:300;color:var(--ink2)}
.hero-top{display:flex;align-items:flex-end;justify-content:space-between;gap:32px;flex-wrap:wrap}
.hero-title-block{flex-shrink:0}
.hero-stats{display:flex;flex-wrap:wrap;gap:30px;padding-bottom:4px}
.hstat .n{font-family:'Oswald',sans-serif;font-weight:600;font-size:30px;line-height:1;color:var(--gold2)}
.hstat .l{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.12em;margin-top:5px}
.hstat.skel .n{color:var(--line2)}

nav{position:sticky;top:0;z-index:50;background:rgba(13,20,16,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.nav-inner{display:flex;gap:6px;padding:10px 0;flex-wrap:wrap;align-items:center}
.tab{font-family:'Oswald',sans-serif;font-weight:500;font-size:15px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);background:none;border:none;cursor:pointer;padding:9px 16px;border-radius:8px;white-space:nowrap;transition:.18s}
.tab:hover{color:var(--ink);background:var(--panel)}
.tab.active{color:#1a1209;background:var(--gold)}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
/* sticky year/refresh bar directly under the nav */
.yearbar{position:sticky;top:53px;z-index:45;background:rgba(13,20,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.yearbar-inner{display:flex;align-items:center;gap:14px;padding:9px 0}
.yearbar-lbl{font-family:'JetBrains Mono';font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3)}
.yearsel{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px}
.yearsel button{font-family:'Oswald';font-weight:500;font-size:13px;letter-spacing:.03em;color:var(--ink3);background:none;border:none;padding:7px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;transition:.15s}
.yearsel button:hover{color:var(--ink)}
.yearsel button.on{background:var(--gold);color:#1a1209}
.refresh{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);background:var(--panel);border:1px solid var(--line);padding:7px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;display:flex;gap:6px;align-items:center;transition:.15s;margin-left:auto}
.refresh:hover{color:var(--ink);border-color:var(--line2)}
.refresh svg{width:13px;height:13px}

main{padding:34px 0 80px}
#leaderboard{padding-top:14px}
.view{display:none;animation:fade .35s ease;padding-bottom:48px}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.section-head h2{font-family:'Oswald',sans-serif;font-weight:600;font-size:28px;text-transform:uppercase;letter-spacing:.01em}
.section-head .hint{color:var(--ink3);font-size:13px}

.status{min-height:50vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding:40px}
.spinner{width:46px;height:46px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--gold);animation:spin2 .9s linear infinite}
@keyframes spin2{to{transform:rotate(360deg)}}
.status h3{font-family:'Oswald';font-weight:500;font-size:22px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2)}
.status p{color:var(--ink3);max-width:460px;font-size:14px}
.status.err h3{color:var(--lose)}
.status code{font-family:'JetBrains Mono';font-size:12px;background:var(--panel);border:1px solid var(--line);padding:2px 7px;border-radius:5px;color:var(--gold2)}
.status .steps{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 22px;max-width:520px;font-size:13.5px;color:var(--ink2);line-height:1.9}
.status .steps b{color:var(--ink)}
.status .steps ol{margin:8px 0 0;padding-left:20px}
.btn{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.04em;font-size:14px;background:var(--gold);color:#1a1209;border:none;padding:11px 22px;border-radius:9px;cursor:pointer}

.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin:14px 0 34px;align-items:end}
.pod-card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:22px 18px;text-align:center;position:relative;box-shadow:var(--shadow);overflow:hidden}
.pod-card.p1{border-color:var(--gold);transform:translateY(-14px)}
.pod-accent{position:absolute;top:0;left:0;right:0;height:4px;z-index:2}
.pod-tint{position:absolute;inset:0;z-index:0;pointer-events:none}
.pod-card.themed .medal,.pod-card.themed .pod-name,.pod-card.themed .dial,.pod-card.themed .pod-meta{position:relative;z-index:1}
.pod-fav{display:inline-flex;vertical-align:middle;margin-left:4px}
.medal{font-family:'Oswald';font-weight:700;font-size:13px;letter-spacing:.1em;color:var(--ink3);text-transform:uppercase}
.pod-card.p1 .medal{color:var(--gold)}
.pod-name{font-family:'Oswald';font-weight:600;font-size:26px;margin:8px 0 2px;text-transform:uppercase}
.dial{margin:14px auto 10px;width:118px;height:118px;position:relative}
.dial svg{transform:rotate(-90deg)}
.dial .val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dial .val b{font-family:'Oswald';font-weight:600;font-size:30px;line-height:1;color:var(--ink)}
.dial .val span{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}
.pod-meta{font-size:13px;color:var(--ink2);margin-top:4px}
.pod-meta b{color:var(--ink)}

.panel{background:linear-gradient(180deg,var(--panel),var(--felt2));border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px}
table{width:100%;border-collapse:collapse}
th{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);text-align:right;padding:13px 14px;border-bottom:1px solid var(--line);font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
th:first-child{text-align:left}
th.sortable:hover{color:var(--gold)}
th .arr{opacity:.6;font-size:9px}
td{padding:13px 14px;text-align:right;border-bottom:1px solid rgba(42,64,53,.5);font-variant-numeric:tabular-nums;font-size:14px}
td:first-child{text-align:left}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s}
tbody tr:hover{background:rgba(217,178,90,.06)}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-family:'Oswald';font-weight:600;font-size:13px;margin-right:10px;background:var(--panel2);color:var(--ink3)}
.rank-badge.top{background:var(--gold);color:#1a1209}
.pname{font-family:'Oswald';font-weight:500;font-size:16px;text-transform:uppercase;letter-spacing:.02em}
.bar-cell{min-width:130px}
.bar{height:7px;border-radius:4px;background:var(--panel2);overflow:hidden;margin-top:5px}
.bar>i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--G),var(--gold))}
.wr{font-family:'Oswald';font-weight:600;font-size:15px}
.muted{color:var(--ink3)}

/* ===== HEAD TO HEAD (redesigned) ===== */
.h2h-intro{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px;color:var(--ink2);font-size:14.5px;display:flex;gap:14px;align-items:flex-start}
.h2h-intro .ico{flex-shrink:0;width:34px;height:34px;border-radius:9px;background:rgba(217,178,90,.14);display:flex;align-items:center;justify-content:center;color:var(--gold2);font-family:'Oswald';font-weight:700;font-size:18px}
.h2h-toggle{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:20px}
.h2h-toggle button{font-family:'Oswald';font-weight:500;text-transform:uppercase;font-size:13px;letter-spacing:.03em;color:var(--ink3);background:none;border:none;padding:8px 16px;border-radius:7px;cursor:pointer;transition:.15s}
.h2h-toggle button.on{background:var(--gold);color:#1a1209}

.h2h-mode{display:none}.h2h-mode.on{display:block}
.h2h-playerpick{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
.h2h-playerpick button{font-family:'Oswald';font-weight:500;font-size:15px;text-transform:uppercase;letter-spacing:.02em;color:var(--ink2);background:var(--panel);border:1px solid var(--line);padding:9px 18px;border-radius:10px;cursor:pointer;transition:.15s}
.h2h-playerpick button:hover{border-color:var(--line2);color:var(--ink)}
.h2h-playerpick button.on{background:var(--gold);color:#1a1209;border-color:var(--gold)}

.rival-hero{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:26px}
.rival-stat{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.rival-stat .lbl{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.rival-stat .who{font-family:'Oswald';font-weight:600;font-size:23px;text-transform:uppercase;line-height:1}
.rival-stat .det{font-size:13px;color:var(--ink2);margin-top:7px}
.rival-stat.best{border-color:rgba(63,155,84,.4)}
.rival-stat.worst{border-color:rgba(214,68,47,.4)}

.matchup-list{display:flex;flex-direction:column;gap:12px}
.matchup{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:0;overflow:hidden;display:flex;align-items:stretch}
.matchup .leftbar{width:6px;flex-shrink:0}
.matchup .body{flex:1;padding:15px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.matchup .vs-line{display:flex;align-items:center;gap:12px;min-width:200px}
.matchup .opp{font-family:'Oswald';font-weight:600;font-size:19px;text-transform:uppercase;letter-spacing:.01em}
.matchup .verdict{font-size:13px;color:var(--ink2);flex:1;min-width:180px}
.matchup .verdict b{color:var(--ink)}
.matchup .nums{display:flex;align-items:center;gap:18px;flex-shrink:0}
.matchup .recbox{text-align:right}
.matchup .recbox .rec{font-family:'Oswald';font-weight:600;font-size:20px;line-height:1}
.matchup .recbox .reclbl{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.matchup .ringwrap{width:54px;height:54px;position:relative;flex-shrink:0}
.matchup .ringwrap svg{transform:rotate(-90deg)}
.matchup .ringwrap .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:600;font-size:15px}
.winbadge{display:inline-block;font-family:'JetBrains Mono';font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.winbadge.w{background:rgba(63,155,84,.18);color:#6cc77e}
.winbadge.l{background:rgba(214,68,47,.18);color:#e87a68}
.winbadge.e{background:rgba(217,178,90,.18);color:var(--gold2)}

/* full grid */
.h2h-scroll{overflow-x:auto;padding-bottom:6px}
.h2h{border-collapse:separate;border-spacing:4px;margin:0 auto}
.h2h th{padding:8px;text-align:center;border:none}
.h2h .rowhead{font-family:'Oswald';font-weight:600;font-size:14px;text-transform:uppercase;color:var(--ink2);text-align:right;padding-right:12px;white-space:nowrap}
.h2h .colhead{font-family:'Oswald';font-weight:600;font-size:14px;text-transform:uppercase;color:var(--ink2);text-align:center;min-width:82px}
.cell{width:82px;height:62px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;border:1px solid var(--line);cursor:default}
.cell.self{background:repeating-linear-gradient(45deg,var(--felt2),var(--felt2) 6px,var(--panel) 6px,var(--panel) 12px)}
.cell .pct{font-family:'Oswald';font-weight:600;font-size:19px;line-height:1}
.cell .rec{font-size:10px;color:var(--ink3);font-family:'JetBrains Mono';margin-top:3px}
.cell .nogame{font-size:11px;color:var(--ink3)}
.h2h-corner{font-family:'JetBrains Mono';font-size:10px;color:var(--ink3);text-align:right;padding-right:12px;line-height:1.4;text-transform:none;letter-spacing:0}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:18px;font-size:12px;color:var(--ink3);align-items:center}
.legend .sw{display:inline-block;width:30px;height:12px;border-radius:3px;vertical-align:middle;margin-right:7px}

.cmd-controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;flex-wrap:wrap}
.seg button{font-family:'Oswald';font-weight:500;text-transform:uppercase;font-size:13px;letter-spacing:.03em;color:var(--ink3);background:none;border:none;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.15s}
.seg button.on{background:var(--gold);color:#1a1209}
.search{flex:1;min-width:180px;max-width:280px}
.search input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;color:var(--ink);font-family:'Inter';font-size:14px}
.search input::placeholder{color:var(--ink3)}
.search input:focus{outline:none;border-color:var(--gold)}

.cmd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.cmd{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;transition:transform .18s,border-color .18s}
.cmd:hover{transform:translateY(-3px);border-color:var(--line2)}
.cmd .topline{height:3px;position:absolute;top:0;left:0;right:0;background:linear-gradient(90deg,var(--G),var(--gold))}
.cmd .cname{font-family:'Oswald';font-weight:600;font-size:18px;line-height:1.1;text-transform:uppercase;letter-spacing:.01em;margin-bottom:14px;min-height:40px;display:flex;align-items:flex-end}
.cmd .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.cmd .row .k{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.cmd .row .v{font-family:'Oswald';font-weight:600;font-size:17px}
.cmd .wrbar{height:8px;border-radius:5px;background:var(--felt);overflow:hidden;margin:4px 0 14px}
.cmd .wrbar>i{display:block;height:100%;border-radius:5px}
.cmd .pilots{border-top:1px solid var(--line);padding-top:11px;display:flex;flex-wrap:wrap;gap:6px}
.cmd .pilot{font-size:11px;font-family:'JetBrains Mono';background:var(--felt);border:1px solid var(--line);padding:3px 8px;border-radius:6px;color:var(--ink2)}
.cmd .pilot b{color:var(--gold2)}
.empty{padding:40px;text-align:center;color:var(--ink3)}

.gl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:26px}
.gl-stat{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:20px}
.gl-stat .big{font-family:'Oswald';font-weight:600;font-size:40px;line-height:1;color:var(--gold2)}
.gl-stat .lbl{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:8px}
.gl-stat .note{font-size:12px;color:var(--ink2);margin-top:10px}
.histo{display:flex;align-items:flex-end;gap:8px;height:200px;padding:16px 0;margin-top:8px}
.histo .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.histo .col .b{width:100%;max-width:54px;background:linear-gradient(180deg,var(--G),#2c6b3b);border-radius:6px 6px 0 0;min-height:3px;transition:height .4s}
.histo .col .ct{font-family:'Oswald';font-weight:600;font-size:15px}
.histo .col .rng{font-size:11px;color:var(--ink3);font-family:'JetBrains Mono';text-align:center;line-height:1.3}

footer{border-top:1px solid var(--line);padding:30px 0;color:var(--ink3);font-size:13px;text-align:center}
footer b{color:var(--ink2)}
footer .src{font-family:'JetBrains Mono';font-size:11px;margin-top:8px;word-break:break-all;opacity:.7}

@media(max-width:680px){
  .podium{grid-template-columns:1fr;gap:12px}
  .pod-card.p1{transform:none}
  h1{font-size:38px}.hero-stats{gap:20px}
  .hero-top{align-items:flex-start;gap:16px}
  .hstat .n{font-size:24px}
  td,th{padding:10px 9px;font-size:13px}.hide-sm{display:none}
  .rival-hero{grid-template-columns:1fr}
  .matchup .body{flex-direction:column;align-items:flex-start}
}

/* custom games filter input */
.cmd-custom-wrap{display:inline-flex;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px 3px 3px 0;gap:4px}
.cmd-custom-wrap.active{border-color:var(--gold)}
.cmd-custom-wrap input{width:84px;background:none;border:none;color:var(--ink);font-family:'Oswald';font-weight:500;font-size:14px;padding:7px 10px;text-align:center}
.cmd-custom-wrap input:focus{outline:none}
.cmd-custom-wrap input::placeholder{color:var(--ink3);font-size:12px;font-family:'Inter'}
.cmd-custom-wrap input::-webkit-outer-spin-button,.cmd-custom-wrap input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.cmd-custom-wrap .lbl{font-family:'Oswald';font-weight:500;text-transform:uppercase;font-size:12px;letter-spacing:.03em;color:var(--ink3);padding-left:12px}

/* clickable matchup affordance */
.matchup{cursor:pointer;transition:transform .15s,border-color .15s}
.matchup:hover{transform:translateY(-2px);border-color:var(--line2)}
.matchup .chev{flex-shrink:0;color:var(--ink3);font-size:20px;display:flex;align-items:center;padding-left:4px}
.matchup:hover .chev{color:var(--gold2)}
.h2h-dig-hint{font-size:13px;color:var(--ink3);margin:-8px 0 16px;display:flex;align-items:center;gap:7px}
.h2h-dig-hint svg{width:14px;height:14px}

/* ===== MATCHUP DETAIL PAGE ===== */
#matchupDetail{display:none}
#matchupDetail.on{display:block;animation:fade .35s ease;padding:14px 0 48px}
.md-back{display:inline-flex;align-items:center;gap:8px;font-family:'Oswald';font-weight:500;text-transform:uppercase;font-size:14px;letter-spacing:.03em;color:var(--ink2);background:var(--panel);border:1px solid var(--line);padding:9px 16px;border-radius:9px;cursor:pointer;margin-bottom:22px;transition:.15s}
.md-back:hover{color:var(--ink);border-color:var(--line2)}
.md-back svg{width:15px;height:15px}
.md-hero{display:flex;align-items:stretch;gap:18px;margin-bottom:26px;flex-wrap:wrap}
.md-player{flex:1;min-width:200px;background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:22px;text-align:center;position:relative;overflow:hidden}
.md-player.winner{border-color:var(--gold)}
.md-player .topband{position:absolute;top:0;left:0;right:0;height:4px}
.md-player .pn{font-family:'Oswald';font-weight:600;font-size:30px;text-transform:uppercase;line-height:1;margin-bottom:14px}
.md-player .bigpct{font-family:'Oswald';font-weight:700;font-size:54px;line-height:1}
.md-player .bigpct .u{font-size:24px;color:var(--ink3)}
.md-player .sublabel{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin-top:8px}
.md-player .winrec{font-family:'Oswald';font-weight:600;font-size:18px;margin-top:10px;color:var(--ink2)}
.md-center{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;min-width:90px}
.md-center .vs{font-family:'Oswald';font-weight:700;font-size:26px;color:var(--gold2);letter-spacing:.05em}
.md-center .gcount{font-size:12px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;text-align:center;margin-top:6px}
.md-center .ties{font-size:12px;color:var(--ink3);margin-top:4px}
.md-summary-line{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:15px 20px;color:var(--ink2);font-size:14.5px;margin-bottom:26px}
.md-summary-line b{color:var(--ink)}

.md-decks-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:26px}
.md-deck-col{background:linear-gradient(180deg,var(--panel),var(--felt2));border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.md-deck-col .colhd{font-family:'Oswald';font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.02em;padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.md-deck-col .colhd .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.md-deck-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(42,64,53,.5)}
.md-deck-row:last-child{border-bottom:none}
.md-deck-row .dname{font-size:14px;color:var(--ink);font-weight:500;flex:1}
.md-deck-row .dstat{display:flex;align-items:center;gap:14px;flex-shrink:0}
.md-deck-row .drec{font-family:'JetBrains Mono';font-size:12px;color:var(--ink3);white-space:nowrap}
.md-deck-row .dpct{font-family:'Oswald';font-weight:600;font-size:16px;min-width:46px;text-align:right}
.md-deck-row .dbar{width:60px;height:6px;border-radius:4px;background:var(--felt);overflow:hidden}
.md-deck-row .dbar>i{display:block;height:100%;border-radius:4px}

.md-pairs{background:linear-gradient(180deg,var(--panel),var(--felt2));border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.md-pairs .ph{padding:18px 20px 4px}
.md-pairs .ph .t{font-family:'Oswald';font-weight:600;font-size:18px;text-transform:uppercase}
.md-pairs .ph .s{font-size:13px;color:var(--ink3);margin-top:2px}
.md-pair-row{display:flex;align-items:center;gap:14px;padding:13px 20px;border-top:1px solid rgba(42,64,53,.5)}
.md-pair-row .matchup-cmds{flex:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:14px}
.md-pair-row .ca{color:var(--ink);font-weight:500}
.md-pair-row .cb{color:var(--ink2)}
.md-pair-row .vsmini{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);text-transform:uppercase;padding:2px 7px;background:var(--felt);border-radius:5px}
.md-pair-row .presult{font-family:'Oswald';font-weight:600;font-size:15px;white-space:nowrap}
.md-pair-row .pgames{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);white-space:nowrap}

@media(max-width:680px){
  .md-decks-grid{grid-template-columns:1fr}
  .md-hero{flex-direction:column}
  .md-player .bigpct{font-size:44px}
}

/* record explanation */
.rec-explain{background:rgba(217,178,90,.07);border:1px solid rgba(217,178,90,.22);border-radius:10px;padding:13px 16px;margin-bottom:20px;font-size:13.5px;color:var(--ink2);display:flex;gap:11px;align-items:flex-start}
.rec-explain .ic{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:rgba(217,178,90,.18);color:var(--gold2);display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;font-size:13px;margin-top:1px}
.rec-explain b{color:var(--gold2);font-weight:600}
.rec-explain .txt{line-height:1.55}

/* ===== CHARTS ===== */
.chart-panel{padding:22px 24px}
.chart-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.chart-area{width:100%}
.trend-svg{width:100%;height:auto;display:block;overflow:visible}
.chart-note{margin-top:16px;font-size:13.5px;color:var(--ink2);text-align:center;line-height:1.5}
.chart-note b{color:var(--gold2)}

.trend-legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:18px;justify-content:center}
.tl-item{display:inline-flex;align-items:center;gap:7px;font-family:'Oswald';font-weight:500;font-size:14px;text-transform:uppercase;letter-spacing:.02em;color:var(--ink2)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.tl-pct{font-family:'JetBrains Mono';font-size:12px;color:var(--ink3);font-weight:400}

/* finish distribution stacked bars */
.finish-chart{display:flex;flex-direction:column;gap:12px}
.fd-row{display:flex;align-items:center;gap:14px}
.fd-name{font-family:'Oswald';font-weight:600;font-size:15px;text-transform:uppercase;letter-spacing:.02em;width:80px;flex-shrink:0;text-align:right}
.fd-bar{flex:1;display:flex;height:34px;border-radius:8px;overflow:hidden;background:var(--felt)}
.fd-seg{display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:600;font-size:12px;color:#0d1410;min-width:0;transition:width .5s ease;overflow:hidden;white-space:nowrap}
.fd-seg:first-child{color:#1a1209}
.fd-tot{font-family:'JetBrains Mono';font-size:12px;color:var(--ink3);width:36px;flex-shrink:0}
.fd-legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:8px;padding-top:14px;border-top:1px solid var(--line);justify-content:center}
.fd-leg-item{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink2)}
.fd-leg-sw{width:16px;height:12px;border-radius:3px}

/* vertical bar chart (turn order) */
.vbar-chart{display:flex;align-items:flex-end;justify-content:center;gap:26px;padding:10px 0}
.vbar-col{display:flex;flex-direction:column;align-items:center;flex:0 1 120px;max-width:120px}
.vbar-val{font-family:'Oswald';font-weight:600;font-size:18px;color:var(--ink);margin-bottom:6px}
.vbar-track{width:100%;height:170px;display:flex;align-items:flex-end}
.vbar{width:100%;border-radius:8px 8px 0 0;min-height:4px;transition:height .5s ease}
.vbar-lbl{font-family:'Oswald';font-weight:500;font-size:14px;text-transform:uppercase;letter-spacing:.03em;margin-top:12px;color:var(--ink2)}
.vbar-sub{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);margin-top:3px}

/* sol ring comparison */
.sol-compare{display:flex;align-items:center;justify-content:center;gap:30px;padding:14px 0;flex-wrap:wrap}
.sol-side{display:flex;flex-direction:column;align-items:center;gap:10px}
.sol-ring-big{width:130px;height:130px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;
  background:conic-gradient(var(--gold) calc(var(--pct)*1%), var(--felt) 0);}
.sol-ring-big::before{content:"";position:absolute;inset:11px;border-radius:50%;background:var(--panel)}
.sol-num{position:relative;font-family:'Oswald';font-weight:700;font-size:30px}
.sol-lbl{font-family:'Oswald';font-weight:500;font-size:15px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink2)}
.sol-sub{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3)}
.sol-vs{display:flex;flex-direction:column;align-items:center;gap:8px}
.sol-arrow{font-size:24px;color:var(--ink3)}
.sol-delta{font-family:'Oswald';font-weight:700;font-size:26px;padding:4px 14px;border-radius:10px}
.sol-delta.pos{color:#6cc77e;background:rgba(63,155,84,.14)}
.sol-delta.neg{color:#e87a68;background:rgba(214,68,47,.14)}

@media(max-width:680px){
  .fd-name{width:60px;font-size:13px}
  .vbar-chart{gap:12px}
  .vbar-col{flex-basis:70px}
  .sol-compare{gap:16px}
  .sol-ring-big{width:104px;height:104px}
  .sol-num{font-size:24px}
}

/* ===== finish counts table (Option B) ===== */
.fc-table{width:100%;border-collapse:collapse}
.fc-th{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);text-align:right;padding:11px 14px;border-bottom:1px solid var(--line);font-weight:600;cursor:pointer;user-select:none;white-space:nowrap}
.fc-th:hover{color:var(--gold)}
.fc-th.fc-l{text-align:left}
.fc-table td{padding:12px 14px;text-align:right;border-bottom:1px solid rgba(42,64,53,.5);font-variant-numeric:tabular-nums;font-size:14px}
.fc-table tbody tr:last-child td{border-bottom:none}
.fc-table tbody tr:hover{background:rgba(217,178,90,.06)}
.fc-name{text-align:left!important;font-family:'Oswald';font-weight:500;font-size:15px;text-transform:uppercase;letter-spacing:.02em}
.fc-podium{font-family:'Oswald';font-weight:600;color:var(--gold2)}
.fc-foot{padding:12px 14px 2px;font-size:12px;color:var(--ink3)}

/* ===== COMMANDER DETAIL PAGE ===== */
#commanderDetail{display:none}
#commanderDetail.on{display:block;animation:fade .35s ease;padding:14px 0 48px}
.cd-header{position:relative;background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:24px;overflow:hidden;margin-bottom:18px}
.cd-topline{position:absolute;top:0;left:0;right:0;height:4px;z-index:2}
.cd-tint{position:absolute;inset:0;z-index:0;pointer-events:none}
.cd-header.themed{border-color:var(--line2)}
.cd-header.themed .cd-title-row,.cd-header.themed .cd-stats,.cd-header.themed .cd-pilotline,.cd-header.themed .ptags{position:relative;z-index:1}
/* ===== PLAYER TAGS ===== */
.ptags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 2px}
.pod-name + .ptags{justify-content:center;margin-top:8px;position:relative;z-index:1}
.ptag{font-family:'Oswald';font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:6px;border:1px solid;cursor:default;white-space:nowrap}
.ptag-endboss{color:#e0b34a;border-color:rgba(224,179,74,.5);background:rgba(224,179,74,.12)}
.ptag-badluck{color:#8fb0e0;border-color:rgba(120,150,220,.45);background:rgba(120,150,220,.1)}
.ptag-grinder{color:#c9a27a;border-color:rgba(201,162,122,.45);background:rgba(201,162,122,.1)}
.ptag-podium{color:#6cc77e;border-color:rgba(108,199,126,.45);background:rgba(108,199,126,.1)}
.ptag-solking{color:#e0b34a;border-color:rgba(224,179,74,.45);background:rgba(224,179,74,.1)}
.ptag-brewer{color:#b78fe0;border-color:rgba(160,120,220,.45);background:rgba(160,120,220,.1)}
.ptag-onetrick{color:#e0955f;border-color:rgba(224,149,95,.45);background:rgba(224,149,95,.1)}
.ptag-slowpoke{color:#c98f8f;border-color:rgba(201,143,143,.45);background:rgba(201,143,143,.1)}
.ptag-speed{color:#5fd0c8;border-color:rgba(95,208,200,.45);background:rgba(95,208,200,.1)}
.ptag-streaker{color:#6cc77e;border-color:rgba(108,199,126,.5);background:rgba(108,199,126,.13)}
.ptag-rentner{color:#e8917a;border-color:rgba(232,145,122,.5);background:rgba(232,145,122,.13)}
.ptag-onfire{color:#ff8c42;border-color:rgba(255,140,66,.55);background:rgba(255,140,66,.14)}
.ptag-deco{color:var(--ink3);border-color:var(--line2);background:rgba(255,255,255,.03)}
.ptag-bench{color:#a89a8a;border-color:rgba(168,154,138,.4);background:rgba(168,154,138,.08)}
.cd-title-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.cd-name{font-family:'Oswald';font-weight:600;font-size:30px;text-transform:uppercase;letter-spacing:.01em;line-height:1.05}
.cd-extra{font-size:13px;color:var(--ink3)}
.cd-extra b{color:var(--gold2);font-weight:600}
.cd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.cd-stat{background:var(--felt);border:1px solid var(--line);border-radius:11px;padding:16px;text-align:center}
.cd-stat-v{font-family:'Oswald';font-weight:600;font-size:30px;line-height:1;color:var(--ink)}
.cd-stat-l{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-top:7px}
.cd-pilotline{font-size:13px;color:var(--ink3);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cd-pilot-chip{font-family:'JetBrains Mono';font-size:11px;background:var(--felt);border:1px solid var(--line);padding:3px 9px;border-radius:6px;color:var(--ink2)}
.cd-pilot-chip b{color:var(--gold2)}

.cd-grid2{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
.cd-card{background:linear-gradient(180deg,var(--panel),var(--felt2));border:1px solid var(--line);border-radius:var(--radius);padding:20px}
.cd-card-hd{font-family:'Oswald';font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:.02em}
.cd-card-sub{font-size:12.5px;color:var(--ink3);margin-top:2px;margin-bottom:16px}

.cd-vp-list{display:flex;flex-direction:column;gap:11px}
.cd-vp-row{display:flex;align-items:center;gap:12px}
.cd-vp-name{font-family:'Oswald';font-weight:500;font-size:15px;text-transform:uppercase;width:74px;flex-shrink:0}
.cd-vp-track{flex:1;height:9px;border-radius:5px;background:var(--felt);overflow:hidden}
.cd-vp-fill{height:100%;border-radius:5px;transition:width .5s ease}
.cd-vp-pct{font-family:'Oswald';font-weight:600;font-size:15px;width:42px;text-align:right}
.cd-vp-rec{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);width:54px;text-align:right}

.cd-side{display:flex;flex-direction:column;gap:14px}
.cd-mini{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:12px;padding:15px 17px}
.cd-mini.best{border-color:rgba(63,155,84,.4)}
.cd-mini.worst{border-color:rgba(214,68,47,.4)}
.cd-mini-l{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:7px}
.cd-mini-who{font-family:'Oswald';font-weight:600;font-size:21px;text-transform:uppercase;line-height:1}
.cd-mini-d{font-size:12.5px;color:var(--ink2);margin-top:6px}
.cd-finish-card{padding:18px}

.cd-pilot-list{display:flex;flex-direction:column;gap:10px}
.cd-pilot-row{display:flex;align-items:center;gap:12px}
.cd-pilot-name{font-family:'Oswald';font-weight:500;font-size:15px;text-transform:uppercase;width:84px;flex-shrink:0}
.cd-pilot-games{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);width:70px;flex-shrink:0}
.cd-pilot-track{flex:1;height:9px;border-radius:5px;background:var(--felt);overflow:hidden}
.cd-pilot-fill{height:100%;border-radius:5px;transition:width .5s ease}
.cd-pilot-wr{font-family:'Oswald';font-weight:600;font-size:15px;width:46px;text-align:right}

.cd-dm-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.cd-dm-col{}
.cd-dm-hd{font-family:'Oswald';font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.cd-dm-hd.up{color:#6cc77e}
.cd-dm-hd.down{color:#e87a68}
.cd-dm-row{display:flex;align-items:center;gap:10px;padding:8px 0}
.cd-dm-name{flex:1;font-size:13px;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cd-dm-pct{font-family:'Oswald';font-weight:600;font-size:14px;width:40px;text-align:right;flex-shrink:0}
.cd-dm-rec{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);width:48px;text-align:right;flex-shrink:0}
.cd-dm-g{font-family:'JetBrains Mono';font-size:10px;color:var(--ink3);width:30px;text-align:right;flex-shrink:0}
.cd-dm-empty{color:var(--ink3);padding:8px 0}

.cmd-clickable{cursor:pointer}
.cmd-clickable:hover{transform:translateY(-3px);border-color:var(--line2)}

@media(max-width:680px){
  .cd-stats{grid-template-columns:repeat(2,1fr)}
  .cd-grid2{grid-template-columns:1fr}
  .cd-dm-cols{grid-template-columns:1fr;gap:20px}
}

/* ===== date range selector ===== */
.yearsel-wrap{position:relative}
.yr-custom{position:relative}
.yr-custom::before{content:"";display:inline-block;width:4px;height:4px;border-radius:50%;background:currentColor;margin-right:5px;vertical-align:middle;opacity:.5}
.range-panel{position:absolute;top:calc(100% + 8px);right:0;z-index:200;background:var(--panel);border:1px solid var(--line2);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.5);padding:16px;min-width:240px;display:none}
.range-panel.on{display:block;animation:fade .2s ease}
.rp-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:11px}
.rp-lbl{font-family:'Oswald';font-weight:500;font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3)}
.rp-sel{flex:1;max-width:150px;background:var(--felt);border:1px solid var(--line);border-radius:8px;color:var(--ink);font-family:'Inter';font-size:13px;padding:8px 10px;cursor:pointer}
.rp-sel:focus{outline:none;border-color:var(--gold)}
.rp-actions{display:flex;gap:8px;margin-top:14px;padding-top:13px;border-top:1px solid var(--line)}
.rp-clear,.rp-apply{flex:1;font-family:'Oswald';font-weight:500;text-transform:uppercase;font-size:13px;letter-spacing:.03em;padding:9px;border-radius:8px;cursor:pointer;border:1px solid var(--line);transition:.15s}
.rp-clear{background:none;color:var(--ink3)}
.rp-clear:hover{color:var(--ink);border-color:var(--line2)}
.rp-apply{background:var(--gold);color:#1a1209;border-color:var(--gold)}
.rp-apply:hover{background:var(--gold2)}

@media(max-width:680px){
  .range-panel{right:auto;left:0}
}

/* ===== PLAYER DETAIL PAGE ===== */
#playerDetail{display:none}
#playerDetail.on{display:block;animation:fade .35s ease;padding:14px 0 48px}

/* clickable leaderboard rows + podium */
.lb-row{cursor:pointer}
.lb-row:hover{background:rgba(217,178,90,.09)!important}
.lb-row:hover .pname{color:var(--gold2)}
.pod-clickable{cursor:pointer;transition:transform .18s,border-color .18s}
.pod-clickable:hover{transform:translateY(-4px);border-color:var(--line2)}
.pod-card.p1.pod-clickable:hover{transform:translateY(-18px)}

/* year on year */
.pp-yoy-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:18px}
.yoy-chart{display:flex;align-items:flex-end;justify-content:space-around;gap:18px;padding:6px 0}
.yoy-bar-col{display:flex;flex-direction:column;align-items:center;flex:1;max-width:120px}
.yoy-bar-val{font-family:'Oswald';font-weight:600;font-size:17px;color:var(--ink);margin-bottom:6px}
.yoy-bar-track{width:100%;height:150px;display:flex;align-items:flex-end}
.yoy-bar{width:100%;border-radius:8px 8px 0 0;min-height:4px;transition:height .5s ease}
.yoy-bar-yr{font-family:'Oswald';font-weight:600;font-size:16px;margin-top:11px;color:var(--ink)}
.yoy-bar-sub{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);margin-top:3px}
.yoy-table{width:100%;border-collapse:collapse}
.yoy-table th{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);text-align:right;padding:12px 14px;border-bottom:1px solid var(--line);font-weight:600;white-space:nowrap}
.yoy-table th.fc-l{text-align:left}
.yoy-table td{padding:12px 14px;text-align:right;border-bottom:1px solid rgba(42,64,53,.5);font-variant-numeric:tabular-nums;font-size:14px}
.yoy-table tbody tr:last-child td{border-bottom:none}
.yoy-table tbody tr:hover{background:rgba(217,178,90,.05)}
.yoy-yr{text-align:left!important;font-family:'Oswald';font-weight:600;font-size:16px;color:var(--gold2)}

/* player two-column (trend + finish) */
.pp-two-col{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;align-items:start}
.pp-rival-row{cursor:pointer;border-radius:8px;padding:4px 6px;margin:0 -6px;transition:background .15s}
.pp-rival-row:hover{background:rgba(217,178,90,.07)}
.pp-rival-row:hover .chev{color:var(--gold2)!important}

/* ===== RECENT GAMES ===== */
.rg-list{display:flex;flex-direction:column;gap:14px}
.rg-card{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.rg-card-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line);background:rgba(13,20,16,.25);flex-wrap:wrap}
.rg-card-head .left{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.rg-gnum{font-family:'Oswald';font-weight:700;font-size:15px;color:var(--gold2);letter-spacing:.02em}
.rg-date{font-family:'JetBrains Mono';font-size:12px;color:var(--ink2)}
.rg-time{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono';font-size:12px;color:var(--ink2);background:var(--panel);border:1px solid var(--line);padding:5px 11px;border-radius:20px;white-space:nowrap}
.rg-time svg{width:13px;height:13px;stroke:var(--ink3)}
.rg-time.none{color:var(--ink3)}
.rg-time b{color:var(--ink);font-family:'Oswald';font-weight:600;font-size:14px}
.rg-seats{display:flex;flex-direction:column}
.rg-seat{display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid rgba(42,64,53,.4)}
.rg-seat:last-child{border-bottom:none}
.rg-seat.win{background:linear-gradient(90deg,rgba(217,178,90,.10),transparent 70%)}
.rg-pos{flex-shrink:0;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;font-size:14px;background:var(--panel2);color:var(--ink3)}
.rg-pos.p1{background:var(--gold);color:#1a1209}
.rg-pos.p2{background:#5c6b58;color:var(--ink)}
.rg-who{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.rg-pl{font-family:'Oswald';font-weight:600;font-size:16px;text-transform:uppercase;letter-spacing:.01em;color:var(--ink);cursor:pointer;align-self:flex-start;border-bottom:1px dotted transparent;transition:.14s;line-height:1.1}
.rg-pl:hover{color:var(--gold2);border-bottom-color:var(--gold2)}
.rg-cmd{font-size:13.5px;color:var(--ink2);cursor:pointer;align-self:flex-start;border-bottom:1px dotted transparent;transition:.14s;line-height:1.2}
.rg-cmd:hover{color:var(--gold2);border-bottom-color:var(--gold2)}
.rg-meta{flex-shrink:0;display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono';font-size:10.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em}
.rg-meta .sol{color:var(--gold2);border:1px solid rgba(217,178,90,.4);border-radius:5px;padding:2px 6px}
.rg-meta .seat{white-space:nowrap}
.rg-more-wrap{display:flex;align-items:center;gap:16px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.rg-more{font-family:'Oswald';font-weight:500;text-transform:uppercase;letter-spacing:.04em;font-size:14px;background:var(--panel);color:var(--ink);border:1px solid var(--line2);padding:11px 26px;border-radius:10px;cursor:pointer;transition:.15s}
.rg-more:hover{background:var(--panel2);border-color:var(--gold)}
.rg-more:disabled{opacity:.4;cursor:default}
.rg-count{font-family:'JetBrains Mono';font-size:12px;color:var(--ink3)}
.rg-spark-pt{cursor:default}
.rg-fd-name{cursor:pointer;transition:color .14s}
.rg-fd-name:hover{color:var(--gold2)}

/* ===== RECENT GAMES: window controls ===== */
.rg-controls{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:16px 20px;margin-top:18px;box-shadow:var(--shadow)}
.rg-ctrl-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.rg-ctrl-lbl{font-family:'JetBrains Mono';font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3)}
.rg-winseg{display:inline-flex;background:var(--felt);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.rg-winseg button{font-family:'Oswald';font-weight:500;font-size:14px;background:transparent;color:var(--ink2);border:none;padding:8px 16px;cursor:pointer;transition:.14s;border-right:1px solid var(--line)}
.rg-winseg button:last-child{border-right:none}
.rg-winseg button:hover{color:var(--ink);background:var(--panel)}
.rg-winseg button.on{background:var(--gold);color:#1a1209;font-weight:600}
.rg-win-custom{width:78px;font-family:'Oswald';font-weight:500;font-size:14px;background:var(--felt);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 12px;outline:none;transition:.14s;-moz-appearance:textfield}
.rg-win-custom::-webkit-outer-spin-button,.rg-win-custom::-webkit-inner-spin-button{opacity:1;height:20px}
.rg-win-custom:focus{border-color:var(--gold)}
.rg-win-custom.active{border-color:var(--gold);background:rgba(217,178,90,.08)}
.rg-win-custom::placeholder{color:var(--ink3);font-size:12px}
.rg-slider-row{margin-top:14px;gap:12px}
.rg-step{flex-shrink:0;width:36px;height:36px;border-radius:9px;background:var(--felt);border:1px solid var(--line2);color:var(--ink);font-size:13px;cursor:pointer;transition:.14s;display:flex;align-items:center;justify-content:center}
.rg-step:hover:not(:disabled){border-color:var(--gold);background:var(--panel2)}
.rg-step:disabled{opacity:.3;cursor:default}
#rgSlider{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:4px;background:linear-gradient(90deg,var(--gold2),var(--line2));outline:none;cursor:pointer;min-width:120px}
#rgSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:var(--gold);border:2px solid var(--panel);box-shadow:0 1px 4px rgba(0,0,0,.4);cursor:pointer}
#rgSlider::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:var(--gold);border:2px solid var(--panel);box-shadow:0 1px 4px rgba(0,0,0,.4);cursor:pointer}
#rgSlider:disabled{opacity:.4;cursor:default}
.rg-focus{margin-top:12px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.rg-focus-main{font-family:'Oswald';font-weight:600;font-size:15px;color:var(--ink)}
.rg-focus-dates{font-family:'JetBrains Mono';font-size:11.5px;color:var(--gold2)}

/* ===== COMMANDER PACE ===== */
.pace-grid{display:grid;grid-template-columns:1fr 1fr;gap:26px}
.pace-col-title{font-family:'Oswald';font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.pace-col-title.fast{color:#6cc77e}
.pace-col-title.slow{color:#e87a68}
.pace-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(42,64,53,.4);cursor:pointer;transition:.14s}
.pace-row:last-child{border-bottom:none}
.pace-row:hover{background:rgba(217,178,90,.06)}
.pace-row .pcm{flex:1;min-width:0;font-family:'Oswald';font-weight:500;font-size:15px;text-transform:uppercase;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:1px dotted transparent}
.pace-row:hover .pcm{color:var(--gold2)}
.pace-track{flex-shrink:0;width:120px;height:8px;display:flex;align-items:center;position:relative}
.pace-track .mid{position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--line2)}
.pace-track .fill{position:absolute;top:0;height:8px;border-radius:4px}
.pace-track .fill.f{right:50%;background:linear-gradient(90deg,#3f9b54,#6cc77e)}
.pace-track .fill.s{left:50%;background:linear-gradient(90deg,#e87a68,#d6442f)}
.pace-delta{flex-shrink:0;width:74px;text-align:right;font-family:'Oswald';font-weight:600;font-size:15px;font-variant-numeric:tabular-nums}
.pace-delta.f{color:#6cc77e}
.pace-delta.s{color:#e87a68}
.pace-delta small{display:block;font-family:'JetBrains Mono';font-weight:400;font-size:9.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.pace-sub{font-size:11px;color:var(--ink3);font-family:'JetBrains Mono';margin-top:14px}

/* ===== COLOR PIPS ===== */
.pips{display:inline-flex;align-items:center;gap:3px;vertical-align:middle}
.pip{display:inline-block;border-radius:50%;flex-shrink:0}
.cname-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cname-row .cname{margin:0}

/* ===== COLOR STATS ===== */
.colorstats-wrap{margin-top:38px}
.cs-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
.cs-panel{background:linear-gradient(165deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow)}
.cs-panel h3{font-family:'Oswald';font-weight:600;font-size:15px;text-transform:uppercase;letter-spacing:.04em;margin:0 0 4px}
.cs-panel .cs-sub{font-size:12.5px;color:var(--ink3);margin-bottom:16px}
.cs-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(42,64,53,.4)}
.cs-row:last-child{border-bottom:none}
.cs-swatch{flex-shrink:0;width:22px;height:22px;border-radius:50%}
.cs-label{flex-shrink:0;width:82px;font-family:'Oswald';font-weight:500;font-size:14px;text-transform:uppercase;letter-spacing:.02em}
.cs-bartrack{flex:1;height:9px;background:var(--felt);border-radius:5px;overflow:hidden;min-width:36px}
.cs-barfill{height:100%;border-radius:5px}
.cs-val{flex-shrink:0;width:104px;text-align:right;font-family:'JetBrains Mono';font-size:12px;color:var(--ink2)}
.cs-val b{font-family:'Oswald';font-weight:600;font-size:15px;color:var(--ink)}
.cs-empty{color:var(--ink3);font-size:13px;padding:6px 0}
.cs-note{font-size:11px;color:var(--ink3);font-family:'JetBrains Mono';margin-top:14px}

/* ===== PLAYER COLOR PROFILE ===== */
.pcolor-callouts{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.pcolor-callout{background:linear-gradient(180deg,var(--panel),var(--felt2));border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.pcolor-callout-l{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:9px}
.pcolor-callout-main{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.pcolor-callout-name{font-family:'Oswald';font-weight:600;font-size:18px;letter-spacing:.02em}
.pcolor-callout-d{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3)}
.pcolor-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
/* prevalence rows (colors + combos): pips/label · bar · % · winrate/games */
.pcv-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,64,53,.4)}
.pcv-row:last-child{border-bottom:none}
.pcv-label{flex-shrink:0;width:64px;font-family:'Oswald';font-weight:500;font-size:14px;text-transform:uppercase;letter-spacing:.02em}
.pcv-key{flex-shrink:0;width:56px;font-family:'JetBrains Mono';font-size:12px;color:var(--ink2);letter-spacing:.05em}
.pcv-track{flex:1;height:9px;background:var(--felt);border-radius:5px;overflow:hidden;min-width:30px}
.pcv-fill{height:100%;border-radius:5px}
.pcv-pct{flex-shrink:0;width:46px;text-align:right;font-family:'Oswald';font-weight:600;font-size:15px;font-variant-numeric:tabular-nums;color:var(--ink)}
.pcv-wr{flex-shrink:0;width:78px;text-align:right;display:flex;flex-direction:column;align-items:flex-end;line-height:1.2}
.cs-wr{font-family:'Oswald';font-weight:600;font-size:14px}
.pcv-g{font-family:'JetBrains Mono';font-size:9.5px;color:var(--ink3)}
.pcv-more{font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);padding-top:10px;text-align:center}
/* one-line stacked share bar for the whole combo distribution */
.pcstack{display:flex;height:16px;border-radius:8px;overflow:hidden;border:1px solid var(--line);background:var(--felt)}
.pcstack-seg{height:100%;min-width:2px}
.pcstack-seg:not(:last-child){border-right:1px solid rgba(0,0,0,.25)}
/* weighted single color bar (each color once, sums to 100%) */
.cw-stack{height:26px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.cw-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:16px}
.cw-leg{display:flex;align-items:center;gap:7px}
.cw-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.cw-leg-l{font-family:'Oswald';font-weight:500;font-size:13px;text-transform:uppercase;letter-spacing:.02em;color:var(--ink2)}
.cw-leg-v{font-family:'Oswald';font-weight:600;font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums}
.cw-combos-hd{margin-top:20px;padding-top:16px;border-top:1px solid var(--line);font-family:'Oswald';font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink2);margin-bottom:8px}
.cw-combos-sub{font-family:'JetBrains Mono';font-size:10.5px;text-transform:none;letter-spacing:0;color:var(--ink3);font-weight:400;margin-left:4px}

/* ===== streaks / diversity / parity (Other tab) ===== */
.strk-list{display:flex;flex-direction:column}
.strk-row{display:flex;align-items:center;gap:16px;padding:12px;border-bottom:1px solid rgba(42,64,53,.4)}
.strk-row:last-child{border-bottom:none}
.strk-name{flex-shrink:0;width:120px;display:flex;align-items:center;gap:8px;font-family:'Oswald';font-weight:600;font-size:15px;text-transform:uppercase;letter-spacing:.02em;cursor:pointer;transition:color .14s}
.strk-name:hover{color:var(--gold2)}
.strk-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.strk-bars{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.strk-metric{display:flex;align-items:center;gap:10px}
.strk-metric-l{flex-shrink:0;width:72px;font-family:'JetBrains Mono';font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);text-align:right}
.strk-track{flex:1;height:20px;background:var(--felt);border-radius:5px;overflow:hidden;min-width:40px}
.strk-fill{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-family:'Oswald';font-weight:700;font-size:13px;color:#1a1209;min-width:22px;transition:width .3s}
.strk-fill.win{background:linear-gradient(90deg,#3f9b54,#6cc77e)}
.strk-fill.dry{background:linear-gradient(90deg,#c26b5a,#e8917a);color:#241009}
.strk-cur-wrap{flex-shrink:0;width:104px;text-align:right}
.strk-cur{font-family:'JetBrains Mono';font-size:10.5px;padding:4px 8px;border-radius:6px;display:inline-block;line-height:1.3}
.strk-cur.win{background:rgba(108,199,126,.14);color:#6cc77e;border:1px solid rgba(108,199,126,.3)}
.strk-cur.dry{background:rgba(232,145,122,.12);color:#e8917a;border:1px solid rgba(232,145,122,.3)}
.div-row{display:flex;align-items:center;gap:16px;padding:11px 12px;border-bottom:1px solid rgba(42,64,53,.4);flex-wrap:wrap}
.div-row:last-child{border-bottom:none}
.div-tag{font-family:'JetBrains Mono';font-size:9px;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:5px;margin-left:8px;vertical-align:middle}
.div-tag.brewer{background:rgba(120,150,220,.15);color:#8fb0e0;border:1px solid rgba(120,150,220,.35)}
.div-tag.trick{background:rgba(217,178,90,.14);color:var(--gold2);border:1px solid rgba(217,178,90,.3)}
.div-track{flex:1;height:12px;background:var(--felt);border-radius:6px;overflow:hidden;min-width:60px}
.div-fill{height:100%;border-radius:6px;transition:width .3s}
.div-stats{flex-shrink:0;font-family:'JetBrains Mono';font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:7px}
.div-stats b{font-family:'Oswald';font-weight:600;font-size:14px;color:var(--ink)}
.div-sep{color:var(--line2)}
.parity-note{font-size:13px;color:var(--ink2);padding:14px 20px 4px;font-family:'Oswald'}
.parity-note b{color:var(--gold2)}

/* ===== COMPARE TAB ===== */
.cmp-controls{margin-bottom:18px}
.cmp-seg{display:inline-flex;flex-wrap:wrap;background:var(--felt);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.cmp-seg button{font-family:'Oswald';font-weight:500;font-size:13px;letter-spacing:.02em;color:var(--ink3);background:none;border:none;padding:8px 14px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:.15s}
.cmp-seg button:hover{color:var(--ink)}
.cmp-seg button.on{background:var(--gold);color:#1a1209;font-weight:600}
.cmp-note{font-size:12.5px;color:var(--ink3);margin-bottom:14px;font-family:'JetBrains Mono'}
.cmp-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel)}
.cmp-table{width:100%;border-collapse:collapse;min-width:520px}
.cmp-table th{font-family:'Oswald';font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink3);padding:14px 16px;text-align:center;border-bottom:1px solid var(--line2);white-space:nowrap;background:var(--felt2)}
.cmp-table th.cmp-pl-h{text-align:left;position:sticky;left:0;background:var(--felt2);z-index:2}
.cmp-table th.cmp-all{color:var(--gold2)}
.cmp-table td{padding:12px 16px;text-align:center;border-bottom:1px solid rgba(42,64,53,.4);white-space:nowrap}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-table tr:hover td{background:rgba(217,178,90,.04)}
.cmp-pl{text-align:left!important;font-family:'Oswald';font-weight:600;font-size:15px;text-transform:uppercase;letter-spacing:.02em;cursor:pointer;position:sticky;left:0;background:var(--panel);z-index:1;transition:color .14s}
.cmp-table tr:hover .cmp-pl{background:#1b2620}
.cmp-pl:hover{color:var(--gold2)}
.cmp-dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:8px;vertical-align:middle}
.cmp-v{font-family:'Oswald';font-weight:600;font-size:16px;font-variant-numeric:tabular-nums}
.cmp-v.cmp-best{position:relative}
.cmp-v.cmp-best::after{content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);width:16px;height:2px;background:var(--gold);border-radius:1px}
.cmp-all{background:rgba(217,178,90,.05)}
td.cmp-all .cmp-v{color:var(--gold2)}
.cmp-cmd{font-family:'Oswald';font-weight:600;font-size:14px;display:block}
.cmp-sub{font-family:'JetBrains Mono';font-size:10px;color:var(--ink3);display:block;margin-top:2px}
.cmp-empty{color:var(--ink3)}

@media(max-width:760px){
  .pp-yoy-grid{grid-template-columns:1fr}
  .pp-two-col{grid-template-columns:1fr}
}

/* ================= COMPREHENSIVE MOBILE FIXES ================= */
@media(max-width:680px){
  /* Prevent any horizontal page scroll */
  html,body{overflow-x:hidden;max-width:100%}
  .wrap{padding:0 16px}

  /* Year bar: let it wrap so Refresh never overflows */
  .yearbar-inner{flex-wrap:wrap;gap:10px}
  .yearsel-wrap{flex:1;min-width:0}
  .yearsel{flex-wrap:wrap}
  .refresh{flex-shrink:0}

  /* Leaderboard: scroll the table inside the panel instead of breaking the page.
     Keep the first column (player) generous so the tap target is clear. */
  #leaderboard .panel{overflow-x:auto;-webkit-overflow-scrolling:touch}
  #lbTable{min-width:340px}
  #lbTable td,#lbTable th{padding:11px 10px;font-size:13px}
  .lb-row{cursor:pointer}
  /* a subtle affordance that rows are tappable */
  .pname{position:relative}

  /* Any data table scrolls within its card rather than overflowing */
  .yoy-table,.fc-table{min-width:420px}
  .cd-card,.panel{max-width:100%}
  /* wrap the YoY table card + finish counts so they scroll horizontally */
  #playerDetail .cd-card,#finishChart2,#finishChart{overflow-x:auto;-webkit-overflow-scrolling:touch}

  /* Detail page headers/stats stack nicely */
  .cd-stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .cd-stat-v{font-size:24px}
  .cd-name{font-size:24px}
  .cd-title-row{flex-direction:column;gap:8px}
  .cd-grid2{grid-template-columns:1fr}
  .cd-dm-cols{grid-template-columns:1fr;gap:18px}
  .pp-yoy-grid{grid-template-columns:1fr}
  .pp-two-col{grid-template-columns:1fr}

  /* charts shrink to fit */
  .trend-svg{min-width:0}
  .vbar-chart{gap:10px;flex-wrap:nowrap}
  .vbar-col{flex:1 1 0;min-width:0}
  .yoy-chart{gap:10px}
  .yoy-bar-col{min-width:0}

  /* commander/player rival rows: tighten so they fit */
  .cd-vp-name{width:60px;font-size:13px}
  .cd-vp-rec{width:46px}
  .cd-pilot-name{width:64px}

  /* matchup detail */
  .md-decks-grid{grid-template-columns:1fr}
  .md-hero{flex-direction:column}
  .md-player .bigpct{font-size:44px}

  /* sol ring / finish */
  .fd-name{width:56px;font-size:12px}
  .sol-compare{gap:14px}
  .sol-ring-big{width:104px;height:104px}
  .sol-num{font-size:24px}

  /* back buttons easier to hit */
  .md-back{padding:11px 18px;font-size:14px}

  /* range panel: full-width friendly */
  .range-panel{right:auto;left:0;min-width:200px}

  /* recent games + pace stack on mobile */
  .pace-grid{grid-template-columns:1fr;gap:22px}
  .cs-grid{grid-template-columns:1fr;gap:16px}
  .pcolor-callouts{grid-template-columns:1fr 1fr}
  .pcolor-grid{grid-template-columns:1fr;gap:16px}
  .strk-row{flex-wrap:wrap;gap:10px}
  .strk-name{width:100%}
  .strk-cur-wrap{width:auto}
  .div-stats{font-size:10px;gap:5px}
  .strk-metric-l{width:60px}
  .rg-seat{gap:9px;padding:10px 13px}
  .rg-card-head{padding:11px 13px}
  .rg-meta{flex-direction:column;align-items:flex-end;gap:4px}
  .pace-track{width:84px}
  .pace-delta{width:64px;font-size:14px}

  /* podium stacks */
  .podium{grid-template-columns:1fr;gap:12px}
  .pod-card.p1{transform:none}
  .pod-card.p1.pod-clickable:hover{transform:none}
  h1{font-size:44px}
  .hero-stats{gap:20px}
}

/* very narrow phones */
@media(max-width:400px){
  .cd-stats{grid-template-columns:repeat(2,1fr)}
  .tab{padding:8px 12px;font-size:14px}
  .yearsel button{padding:6px 10px;font-size:12px}
}

/* ---------- CSV + parse ---------- */
function parseCSV(text){
  const rows=[];let row=[],field='',i=0,q=false;
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){field+='"';i+=2;continue;}q=false;i++;continue;}field+=c;i++;continue;}
    if(c==='"'){q=true;i++;continue;}
    if(c===','){row.push(field);field='';i++;continue;}
    if(c==='\r'){i++;continue;}
    if(c==='\n'){row.push(field);rows.push(row);row=[];field='';i++;continue;}
    field+=c;i++;}
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}
/* Date format detected ONCE across the whole dataset (not guessed per-row),

let DATE_FORMAT = 'MDY';
function detectDateFormat(strs){
  let monthFirst=false, dayFirst=false;
  for(const s of strs){
    const m=String(s).match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{4})/);
    if(!m) continue;
    const a=+m[1], b=+m[2];
    if(a>12 && b<=12) dayFirst=true;
    if(b>12 && a<=12) monthFirst=true;
  }
  if(dayFirst && !monthFirst) return 'DMY';
  if(monthFirst && !dayFirst) return 'MDY';
  return 'MDY';
}
function parseDate(s){
  if(!s) return null; s=String(s).trim(); let m;
  if(m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/))
    return`${m[1]}-${String(+m[2]).padStart(2,'0')}-${String(+m[3]).padStart(2,'0')}`;
  if(m=s.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{4})/)){
    let a=+m[1], b=+m[2], y=+m[3], d, mo;
    if(DATE_FORMAT==='DMY'){ d=a; mo=b; } else { mo=a; d=b; }
    if(mo<1||mo>12||d<1||d>31) return null;
    return`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }
  return null;
}
const toInt=v=>{const n=parseInt(v,10);return Number.isFinite(n)?n:null;};

function parseGames(csvText){
  const rows=parseCSV(csvText);
  if(!rows.length)throw new Error("empty");
  const header=rows[0].map(h=>(h||'').trim());
  DATE_FORMAT = detectDateFormat(rows.slice(1).map(r=>r&&r[1]).filter(Boolean));
  const pcols=[];header.forEach((h,idx)=>{if(/^Player/i.test(h))pcols.push(idx);});
  if(!pcols.length)throw new Error("noplayers");
  let gtCol=header.findIndex(h=>/game\s*time/i.test(h));
  const games=[];
  for(let r=1;r<rows.length;r++){const row=rows[r];
    if(!row||!row[0]||!String(row[0]).trim())continue;
    const date=parseDate(row[1]);const seats=[];
    for(const pc of pcols){
      const player=(row[pc]||'').trim(),commander=(row[pc+1]||'').trim();
      const sol=toInt(row[pc+2]),turn=toInt(row[pc+3]),rank=toInt(row[pc+4]);
      if(player&&commander&&rank!=null)seats.push({player,commander,sol,turn,rank});
    }
    let gt=gtCol>=0?toInt(row[gtCol]):null;if(!(gt>0))gt=null;
    if(seats.length>=2)games.push({num:toInt(row[0]),order:games.length,date,gametime:gt,seats});
  }
  if(!games.length)throw new Error("nogames");
  return games;
}

// canonical WUBRG ordering; C (colorless) is its own thing, kept separate from "unknown"
const COLOR_ORDER = ['W','U','B','R','G'];
const COLOR_META = {
  W:{key:'W',hex:'#f4efd6',ring:'#cdbf86',label:'White'},
  U:{key:'U',hex:'#2f7fd0',ring:'#2f7fd0',label:'Blue'},
  B:{key:'B',hex:'#3a3238',ring:'#5a5058',label:'Black'},
  R:{key:'R',hex:'#d6442f',ring:'#d6442f',label:'Red'},
  G:{key:'G',hex:'#3f9b54',ring:'#3f9b54',label:'Green'},
  C:{key:'C',hex:'#b9b2a7',ring:'#b9b2a7',label:'Colorless'}
};
// map: commander name -> array of color letters, e.g. ['U','B'] or ['C'] or [] (unknown)
let COMMANDER_COLORS = {};
// secondary lookup index so Dataset short names ("Atraxa") match Commander-sheet full
// names ("Atraxa, Praetors' Voice") and vice-versa, case/spacing-insensitively.
let COMMANDER_COLOR_INDEX = {};
// key used for fuzzy matching: lowercase, collapse whitespace, strip surrounding quotes
function colorKey(s){ return String(s==null?'':s).toLowerCase().replace(/\s+/g,' ').trim(); }
// the "short" name = everything before the first comma (drops the epithet)
function shortName(s){ const i=String(s).indexOf(','); return (i>=0?String(s).slice(0,i):String(s)).trim(); }
// normalize a raw cell ("bug", "W U B", "colorless", "5c") into an ordered letter array
function normalizeColors(raw){
  if(raw==null) return [];
  let s=String(raw).trim().toUpperCase();
  if(!s) return [];
  // common words / shorthands
  if(/^(C|COLORLESS|COLOURLESS|NONE|N\/A|NA)$/.test(s)) return ['C'];
  if(/^(WUBRG|5C|5-C|FIVE.?COLOR|RAINBOW)$/.test(s)) return ['W','U','B','R','G'];
  // pull only valid color letters, dedupe, then order by WUBRG
  const set=new Set();
  for(const ch of s){ if(COLOR_ORDER.includes(ch)) set.add(ch); }
  if(set.size===0){
    // maybe it literally said colorless-ish but with stray chars, or unknown token
    return s.includes('C') ? ['C'] : [];
  }
  return COLOR_ORDER.filter(c=>set.has(c));
}
function parseColors(csvText){
  const map={};        // full name (as written in the sheet) -> colors
  const index={};      // fuzzy key (full + short) -> colors
  if(!csvText) return {map, index};
  const rows=parseCSV(csvText);
  if(!rows.length) return {map, index};
  // find the Commander + Colors columns by header (fall back to first two columns).
  // Real sheet has a leading "#" column, so we can't assume column 0/1.
  const header=rows[0].map(h=>String(h||'').trim().toLowerCase());
  let ci=header.findIndex(h=>h==='commander'||h.includes('commander')||h.includes('deck'));
  let coi=header.findIndex(h=>h.includes('color')||h.includes('colour')||h.includes('identity'));
  const hasHeader = ci>=0 || coi>=0;
  if(ci<0){ // no header match: guess — a "#"-style index col first means name is col 1
    ci = (rows[0].length>=3 && /^\d*$/.test(String(rows[0][0]||'').trim())) ? 1 : 0;
  }
  if(coi<0) coi = ci+1;
  for(let r=hasHeader?1:0;r<rows.length;r++){
    const row=rows[r]; if(!row) continue;
    const name=String(row[ci]||'').trim();
    if(!name) continue;
    const cols=normalizeColors(row[coi]);
    map[name]=cols;
    // index under full-name key and short-name key (don't clobber an existing exact entry)
    const fk=colorKey(name), sk=colorKey(shortName(name));
    if(!(fk in index)) index[fk]=cols;
    if(sk && !(sk in index)) index[sk]=cols;
  }
  return {map, index};
}
function commanderColors(name){
  if(name==null) return [];
  // 1) exact as-written match
  const exact=COMMANDER_COLORS[name];
  if(Array.isArray(exact)) return exact;
  // 2) fuzzy: try the Dataset name's full key, then its short (pre-comma) key
  const fk=colorKey(name);
  if(fk in COMMANDER_COLOR_INDEX) return COMMANDER_COLOR_INDEX[fk];
  const sk=colorKey(shortName(name));
  if(sk in COMMANDER_COLOR_INDEX) return COMMANDER_COLOR_INDEX[sk];
  return [];
}

function colorPips(name, size){

}

function colorPipsFromArr(cols, size){

// a horizontal accent gradient built from a color array (for the detail topline)
function colorAccentBar(cols){
  if(!cols||!cols.length) return null;
  const hexes=cols.map(c=>(COLOR_META[c]||COLOR_META.C).hex);
  if(hexes.length===1) return `linear-gradient(90deg,${hexes[0]},${hexes[0]})`;
  // spread the colors evenly across the bar
  const stops=hexes.map((h,i)=>`${h} ${Math.round(i/(hexes.length-1)*100)}%`).join(', ');

function colorHeaderTint(cols){

  // soft radial glows in each color, low alpha, positioned across the header
  const glows=hexes.map((h,i)=>{
    const x = hexes.length===1?50:Math.round(8+i/(hexes.length-1)*84);
    return `radial-gradient(circle at ${x}% 0%, ${hexToRgba(h,0.16)}, transparent 62%)`;

let _favColorCache=null;
function playerFavoriteColor(playerName){
  if(!COMMANDER_COLORS || !Object.keys(COMMANDER_COLORS).length) return null;
  if(!_favColorCache){
    _favColorCache={};
    const tally={}; // player -> {color: gamesCount}
    for(const g of (ALL_GAMES||[])) for(const s of g.seats){
      const cols=commanderColors(s.commander); if(!cols.length) continue;
      const t=tally[s.player]||(tally[s.player]={});
      cols.forEach(c=>{ t[c]=(t[c]||0)+1; });

    for(const p of Object.keys(tally)){
      const entries=Object.entries(tally[p]);
      if(!entries.length){ _favColorCache[p]=null; continue; }
      entries.sort((a,b)=> b[1]-a[1] || COLOR_ORDER.indexOf(a[0])-COLOR_ORDER.indexOf(b[0]));

    _favComboCache={};
    const tally={}; // player -> comboKey -> {cols, n}
    for(const g of (ALL_GAMES||[])) for(const s of g.seats){
      const cols=commanderColors(s.commander); if(!cols.length) continue;
      const key=cols.join('');
      const t=tally[s.player]||(tally[s.player]={});
      const e=t[key]||(t[key]={cols, n:0}); e.n++;
    }
    for(const p of Object.keys(tally)){
      const entries=Object.values(tally[p]);
      if(!entries.length){ _favComboCache[p]=[]; continue; }
      entries.sort((a,b)=> b.n-a.n || a.cols.length-b.cols.length);
      _favComboCache[p]=entries[0].cols;
    }
  }
  return _favComboCache[playerName] || [];
}

/* ---------- stats (computed from a games subset) ---------- */
function computeStats(games){
  const P={},H={},C={},PC={};
  for(const g of games){
    for(const s of g.seats){
      const p=P[s.player]||(P[s.player]={name:s.player,games:0,wins:0,rs:0,rn:0,sol:0,soln:0});
      p.games++;if(s.rank===1)p.wins++;p.rs+=s.rank;p.rn++;
      if(s.sol!=null){p.soln++;if(s.sol===1)p.sol++;}
      const c=C[s.commander]||(C[s.commander]={name:s.commander,games:0,wins:0,rs:0,rn:0,pilots:{}});
      c.games++;if(s.rank===1)c.wins++;c.rs+=s.rank;c.rn++;c.pilots[s.player]=(c.pilots[s.player]||0)+1;
      const key=s.player+'||'+s.commander;
      const pc=PC[key]||(PC[key]={player:s.player,commander:s.commander,games:0,wins:0,rs:0,rn:0});
      pc.games++;if(s.rank===1)pc.wins++;pc.rs+=s.rank;pc.rn++;
    }
    for(let i=0;i<g.seats.length;i++)for(let j=0;j<g.seats.length;j++){
      if(i===j)continue;const a=g.seats[i],b=g.seats[j];
      H[a.player]=H[a.player]||{};
      const rec=H[a.player][b.player]||(H[a.player][b.player]={games:0,a:0,b:0,t:0});
      rec.games++;if(a.rank<b.rank)rec.a++;else if(a.rank>b.rank)rec.b++;else rec.t++;
    }
  }
  const players=Object.values(P).map(p=>({name:p.name,games:p.games,wins:p.wins,
    winrate:p.games?+(100*p.wins/p.games).toFixed(1):0,
    avgrank:p.rn?+(p.rs/p.rn).toFixed(2):null,
    solrate:p.soln?+(100*p.sol/p.soln).toFixed(1):null,soln:p.soln}))
    .sort((a,b)=>b.winrate-a.winrate||b.games-a.games);
  const commanders=Object.values(C).map(c=>({name:c.name,games:c.games,wins:c.wins,
    winrate:c.games?+(100*c.wins/c.games).toFixed(1):0,
    avgrank:c.rn?+(c.rs/c.rn).toFixed(2):null,
    pilots:Object.entries(c.pilots).map(([player,games])=>({player,games})).sort((a,b)=>b.games-a.games)}))
    .sort((a,b)=>b.games-a.games||b.winrate-a.winrate);
  const playercommanders={};
  Object.values(PC).forEach(pc=>{(playercommanders[pc.player]=playercommanders[pc.player]||[]).push({
    commander:pc.commander,games:pc.games,wins:pc.wins,
    winrate:pc.games?+(100*pc.wins/pc.games).toFixed(1):0,
    avgrank:pc.rn?+(pc.rs/pc.rn).toFixed(2):null});});
  Object.values(playercommanders).forEach(a=>a.sort((x,y)=>y.games-x.games||y.winrate-x.winrate));
  const dates=games.map(g=>g.date).filter(Boolean).sort();
  const meta={total_games:games.length,total_seats:games.reduce((s,g)=>s+g.seats.length,0),
    n_players:players.length,n_commanders:commanders.length,
    date_range:dates.length?[dates[0],dates[dates.length-1]]:[null,null]};
  const gts=games.map(g=>g.gametime).filter(x=>x!=null).sort((a,b)=>a-b);
  let gl=null;
  if(gts.length){
    const sum=gts.reduce((a,b)=>a+b,0);
    const median=gts.length%2?gts[(gts.length-1)/2]:(gts[gts.length/2-1]+gts[gts.length/2])/2;
    const buckets={};const W=30;
    gts.forEach(v=>{const b=Math.floor(v/W)*W;buckets[b]=(buckets[b]||0)+1;});
    const bmin=Math.min(...Object.keys(buckets).map(Number)),bmax=Math.max(...Object.keys(buckets).map(Number));
    const histo=[];for(let b=bmin;b<=bmax;b+=W)histo.push({lo:b,hi:b+W,count:buckets[b]||0});
    gl={n:gts.length,avg:Math.round(sum/gts.length),median:Math.round(median),min:gts[0],max:gts[gts.length-1],histo,W};
  }
  return {meta,players,h2h:H,commanders,playercommanders,gl};
}

const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function hexToRgb(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function mix(c1,c2,t){const a=hexToRgb(c1),b=hexToRgb(c2);return`rgb(${a.map((v,i)=>Math.round(v+(b[i]-v)*t)).join(',')})`;}
let ALL_GAMES=null, YEARS=[], curYear='all', S=null, CORE=[];

function gamesForYear(){
  if(customRange){
    const f=customRange.from, to=customRange.to;

/* ---------- render everything ---------- */
function rebuild(){
  _tagCache=null;  // recompute superlative tags for the current filter
  const games=gamesForYear();
  const noYear=$('#noYear'), views=$('#views');
  if(!games.length){
    noYear.style.display='block'; views.style.display='none';
    noYear.textContent=t('no_year_data',{year:curYear});
    // still update hero with zeros
    $('#heroStats').innerHTML='';
    return;
  }
  noYear.style.display='none'; views.style.display='block';
  S=computeStats(games);
  CORE=S.players.filter(p=>p.games>=20).map(p=>p.name);
  // if year-filtered and nobody hits 20, lower the bar so views aren't empty
  if(!CORE.length){const minG=Math.max(...S.players.map(p=>p.games),1);
    CORE=S.players.filter(p=>p.games>=Math.min(10,minG)).map(p=>p.name);}
  renderHero();renderPodium();renderLB();renderH2H();renderCmd();renderPlayerPick();renderLength();renderInsights();renderRecent();renderCompare();
  // if the matchup detail page is open, refresh it for the new year/lang (or close if players gone)
  // If a detail page is open, refresh it and KEEP the main views hidden so the
  // detail stays in front when the year/time-span changes. Close only if the
  // subject no longer exists in the filtered data.
  let detailOpen=false;
  if(mdPair){
    if(CORE.includes(mdPair.a)&&CORE.includes(mdPair.b)){ renderMatchupDetail(); detailOpen=true; }
    else closeMatchupDetail();
  }
  if(cdName){
    if(S.commanders.some(c=>c.name===cdName)){ renderCommanderDetail(); detailOpen=true; }
    else closeCommanderDetail();
  }
  if(ppName){
    if(S.players.some(p=>p.name===ppName)){ renderPlayerDetail(); detailOpen=true; }
    else closePlayerDetail();
  }
  if(detailOpen){ $('#views').style.display='none'; }
}

   +heroCard('',t('h2h_most'),most,m=>`${m.games} ${t('h2h_shared')} · ${m.pct}% ${t('h2h_ahead_pct')}`);

  // per-color-count tallies: '1'..'5' plus 'C' for colorless; only seats with known colors
  const byCount={'1':{g:0,w:0},'2':{g:0,w:0},'3':{g:0,w:0},'4':{g:0,w:0},'5':{g:0,w:0},'C':{g:0,w:0}};
  let knownSeats=0;
  for(const g of games){
    for(const s of g.seats){
      const cols=commanderColors(s.commander);
      if(!cols.length) continue;            // unknown → excluded from color stats
      knownSeats++;
      const win=s.rank===1?1:0;
      cols.forEach(c=>{ byColor[c].g++; byColor[c].w+=win; });
      if(cols.length===1 && cols[0]==='C'){ byCount.C.g++; byCount.C.w+=win; }
      else { const k=String(cols.length); if(byCount[k]){ byCount[k].g++; byCount[k].w+=win; } }
    }
  }

  const csHost=document.getElementById('csByColor');
  const ccHost=document.getElementById('csByCount');
  if(knownSeats===0){
    if(csHost) csHost.innerHTML=`<div class="cs-empty">${t('cs_none')}</div>`;
    if(ccHost) ccHost.innerHTML='';
    return;
  }

  // ----- by color -----
  const colorRows=COLOR_ORDER.concat('C')
    .map(c=>({c, g:byColor[c].g, w:byColor[c].w, wr:byColor[c].g?100*byColor[c].w/byColor[c].g:0}))
    .filter(r=>r.g>0)
    .sort((a,b)=>b.wr-a.wr);
  const maxWrC=Math.max(...colorRows.map(r=>r.wr),1);
  csHost.innerHTML=colorRows.map(r=>{
    const m=COLOR_META[r.c];
    return `<div class="cs-row">
      <span class="cs-swatch" style="background:${m.hex};box-shadow:inset 0 0 0 2px ${m.ring}"></span>
      <span class="cs-label">${t('color_'+r.c)}</span>
      <span class="cs-bartrack"><span class="cs-barfill" style="width:${Math.max(r.wr/maxWrC*100,3)}%;background:${m.hex}"></span></span>
      <span class="cs-val"><b>${r.wr.toFixed(1)}%</b> · ${r.g} ${t('cs_seats')}</span>
    </div>`;
  }).join('');

  // ----- by color count -----
  const countOrder=['1','2','3','4','5','C'];
  const countRows=countOrder.map(k=>({k, g:byCount[k].g, w:byCount[k].w, wr:byCount[k].g?100*byCount[k].w/byCount[k].g:0}))
    .filter(r=>r.g>0);
  const maxWrK=Math.max(...countRows.map(r=>r.wr),1);
  ccHost.innerHTML=countRows.map(r=>{
    const label = r.k==='C'?t('color_C'):t('cs_count_'+r.k);
    return `<div class="cs-row">
      <span class="cs-label" style="width:auto;min-width:82px">${label}</span>
      <span class="cs-bartrack"><span class="cs-barfill" style="width:${Math.max(r.wr/maxWrK*100,3)}%;background:linear-gradient(90deg,var(--gold2),var(--gold))"></span></span>
      <span class="cs-val"><b>${r.wr.toFixed(1)}%</b> · ${r.g} ${t('cs_seats')}</span>
    </div>`;
  }).join('') + `<div class="cs-note">${t('cs_expected',{n:(100/4).toFixed(0)})}</div>`;
}
