/* ===== RECENT GAMES (windowed "magnifying glass" view) ===== */
// The list shows a fixed-size window of games. rgWinSize = games in the lens
// (0 = all). rgWinEnd = how far back the window's NEWEST edge sits, in games,
// from the actual newest game (0 = anchored to newest). The slider scrubs rgWinEnd
// from 0 (newest) up to total-size (oldest); larger = further back in time.
let rgWinSize = 10;
let rgWinEnd = 0;

// newest first: by date desc, then by sheet order desc (new rows append at the bottom)
function recentSorted(){
  return gamesForYear().slice().sort((a,b)=>{
    const da=a.date||'', db=b.date||'';
    if(da!==db) return da<db?1:-1;
    return (b.order||0)-(a.order||0);
  });
}

function localizedGameDate(d){
  if(!d) return '—';
  const [y,mo,day]=d.split('-');
  return new Date(y,mo-1,day).toLocaleDateString(lang,{day:'numeric',month:'short',year:'numeric'});
}

// resolve the current window into a slice of the newest-first array + clamp state
function recentWindow(all){
  const total=all.length;
  const size = (rgWinSize===0 || rgWinSize>=total) ? total : rgWinSize;
  const maxEnd = Math.max(0, total-size);
  if(rgWinEnd>maxEnd) rgWinEnd=maxEnd;
  if(rgWinEnd<0) rgWinEnd=0;
  const start=rgWinEnd;                 // offset from newest
  const slice=all.slice(start, start+size);
  return {slice, size, total, start, maxEnd};
}

function renderRecent(){
  const host=$('#rgList'); if(!host) return;
  const all=recentSorted();
  const controls=$('#rgControls');
  if(!all.length){
    host.innerHTML=`<div class="empty">${t('rg_none')}</div>`;
    if(controls) controls.style.display='none';
    renderRecentTrend([]);
    return;
  }
  if(controls) controls.style.display='';
  const win=recentWindow(all);
  const shown=win.slice;

  host.innerHTML=shown.map(g=>{
    const seats=g.seats.slice().sort((a,b)=>a.rank-b.rank);
    const seatRows=seats.map(s=>{
      const posCls = s.rank===1?'p1':s.rank===2?'p2':'';
      const meta=[];
      if(s.turn) meta.push(`<span class="seat">${t('rg_seat')} ${s.turn}</span>`);
      if(s.sol===1) meta.push(`<span class="sol">${t('rg_sol')}</span>`);
      return `<div class="rg-seat${s.rank===1?' win':''}">
        <div class="rg-pos ${posCls}">${s.rank}</div>
        <div class="rg-who">
          <span class="rg-pl" data-player="${esc(s.player)}">${esc(s.player)}</span>
          <span class="rg-cmd" data-cmd="${esc(s.commander)}">${esc(s.commander)}</span>${colorPips(s.commander,10)}
        </div>
        <div class="rg-meta">${meta.join('')}</div>
      </div>`;
    }).join('');
    const timeBadge = g.gametime!=null
      ? `<span class="rg-time"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><b>${g.gametime}</b> ${t('rg_min')}</span>`
      : `<span class="rg-time none">${t('rg_no_time')}</span>`;
    const gnum = g.num!=null ? `${t('rg_game')} #${g.num}` : t('rg_game');
    return `<div class="rg-card">
      <div class="rg-card-head">
        <div class="left"><span class="rg-gnum">${gnum}</span><span class="rg-date">${localizedGameDate(g.date)}</span></div>
        ${timeBadge}
      </div>
      <div class="rg-seats">${seatRows}</div>
    </div>`;
  }).join('');

  // wire clicks for players + commanders
  host.querySelectorAll('.rg-pl').forEach(el=>el.addEventListener('click',()=>openPlayerDetail(el.dataset.player)));
  host.querySelectorAll('.rg-cmd').forEach(el=>el.addEventListener('click',()=>openCommanderDetail(el.dataset.cmd)));

  updateRecentControls(win);
  renderRecentTrend(shown);
}

// sync the size chips, slider bounds/value, stepper enabled state, and focus label
function updateRecentControls(win){
  // size chips: highlight only if the current size matches a preset (0/10/25/50)
  const presets=[0,10,25,50];
  const isPreset=presets.includes(rgWinSize);
  const seg=$('#rgWinSeg');
  if(seg) seg.querySelectorAll('button').forEach(b=>b.classList.toggle('on', isPreset && (+b.dataset.w)===rgWinSize));
  // custom field: show the number when it's a non-preset custom size, else clear
  const cust=$('#rgWinCustom');
  if(cust){
    cust.placeholder=t('rg_win_custom_ph');
    if(document.activeElement!==cust) cust.value = (!isPreset && rgWinSize>0) ? String(rgWinSize) : '';
    cust.classList.toggle('active', !isPreset && rgWinSize>0);
  }
  // slider
  const slider=$('#rgSlider'), sliderRow=$('#rgSliderRow');
  const wholeThing = win.size>=win.total; // window covers everything -> no scrubbing
  if(sliderRow) sliderRow.style.display = wholeThing ? 'none' : '';
  if(slider){
    slider.max=String(win.maxEnd);
    slider.value=String(win.start);
    slider.disabled = wholeThing;
  }
  const newer=$('#rgStepNewer'), older=$('#rgStepOlder');
  if(newer) newer.disabled = win.start<=0;
  if(older) older.disabled = win.start>=win.maxEnd;
  // focus label: which games + date span are in view
  const focus=$('#rgFocus');
  if(focus){
    const first=win.slice[0], last=win.slice[win.slice.length-1]; // first=newest in window
    const nums = (first&&first.num!=null&&last&&last.num!=null)
      ? `#${last.num}–#${first.num}` : '';
    const dates = (last&&last.date&&first&&first.date)
      ? `${localizedGameDate(last.date)} – ${localizedGameDate(first.date)}` : '';
    const posLabel = wholeThing
      ? t('rg_focus_all',{n:win.total})
      : t('rg_focus_window',{n:win.size, total:win.total, from:win.start+1, to:win.start+win.size});
    focus.innerHTML=`<span class="rg-focus-main">${posLabel}</span>${dates?`<span class="rg-focus-dates">${dates}${nums?` · ${nums}`:''}</span>`:''}`;
  }
}

// Finishing positions over the games currently in the window — same stacked bars as
// the Trends tab's "Finishing Positions" chart, scoped to the recent-games window.
function renderRecentTrend(windowGames){
  const host=$('#rgTrendChart'); if(!host) return;
  const hint=$('#rgTrendHint');
  const loaded = windowGames || [];
  const n = loaded.length;

  // tally finishes per player across the loaded games
  const fin={};
  loaded.forEach(g=>g.seats.forEach(s=>{
    fin[s.player]=fin[s.player]||{1:0,2:0,3:0,4:0,tot:0};
    if(s.rank>=1&&s.rank<=4){ fin[s.player][s.rank]++; fin[s.player].tot++; }
  }));
  let data=Object.entries(fin).map(([player,d])=>({
    player, c1:d[1],c2:d[2],c3:d[3],c4:d[4],tot:d.tot,
    p1:d.tot?100*d[1]/d.tot:0,p2:d.tot?100*d[2]/d.tot:0,p3:d.tot?100*d[3]/d.tot:0,p4:d.tot?100*d[4]/d.tot:0
  })).filter(x=>x.tot>0);

  if(!n || !data.length){
    host.innerHTML=`<div class="empty">${t('rg_trend_none')}</div>`;
    if(hint) hint.textContent='';
    return;
  }
  if(hint) hint.textContent=t('rg_trend_sub',{n});

  // sort by 1st-place %, then total games (matches the Trends chart's ordering intent)
  data.sort((a,b)=> b.p1-a.p1 || b.tot-a.tot);
  const segColors={1:'var(--gold)',2:'#9aa97f',3:'#6b7d6f',4:'#3a4a40'};
  const segLabels={1:t('finish_1st'),2:t('finish_2nd'),3:t('finish_3rd'),4:t('finish_4th')};

  host.innerHTML = data.map(d=>{
    const segs=[1,2,3,4].map(r=>{
      const pct=d['p'+r], cnt=d['c'+r];
      if(pct<=0) return '';
      return `<div class="fd-seg" style="width:${pct}%;background:${segColors[r]}" title="${segLabels[r]}: ${cnt} (${Math.round(pct)}%)">${pct>=9?Math.round(pct)+'%':''}</div>`;
    }).join('');
    return `<div class="fd-row">
      <div class="fd-name rg-fd-name" data-player="${esc(d.player)}">${esc(d.player)}</div>
      <div class="fd-bar">${segs}</div>
      <div class="fd-tot">${d.tot}</div>
    </div>`;
  }).join('') + `<div class="fd-legend">${[1,2,3,4].map(r=>`<span class="fd-leg-item"><span class="fd-leg-sw" style="background:${segColors[r]}"></span>${segLabels[r]}</span>`).join('')}</div>`;

  // player names clickable -> profile (a nice extra the Trends chart doesn't have)
  host.querySelectorAll('.rg-fd-name').forEach(el=>el.addEventListener('click',()=>openPlayerDetail(el.dataset.player)));
}

/* ===== COMMANDER PACE (which commanders => fast/slow games) ===== */
const PACE_MIN_GAMES = 4;        // min timed appearances for a commander to qualify
const PACE_SHOW = 8;             // entries per column
function computeCommanderPace(){
  const games=gamesForYear().filter(g=>g.gametime!=null);
  if(games.length<2) return null;
  const overallAvg = games.reduce((s,g)=>s+g.gametime,0)/games.length;
  const cmd={}; // commander -> {sum,n}
  for(const g of games){
    // a commander counts once per game even if (somehow) duplicated
    const seen=new Set();
    for(const s of g.seats){
      if(seen.has(s.commander)) continue;
      seen.add(s.commander);
      const c=cmd[s.commander]||(cmd[s.commander]={sum:0,n:0});
      c.sum+=g.gametime; c.n++;
    }
  }
  const arr=Object.entries(cmd)
    .filter(([_,c])=>c.n>=PACE_MIN_GAMES)
    .map(([name,c])=>({name,games:c.n,avg:c.sum/c.n,delta:(c.sum/c.n)-overallAvg}))
    .sort((a,b)=>a.delta-b.delta);
  if(!arr.length) return null;
  const maxAbs=Math.max(...arr.map(a=>Math.abs(a.delta)),1);
  return {overallAvg:Math.round(overallAvg), rows:arr, maxAbs};
}

function renderPace(){
  const grid=$('#paceGrid'); if(!grid) return;
  const help=$('#paceHelp');
  const d=computeCommanderPace();
  if(!d){
    if(help) help.textContent='';
    grid.innerHTML=`<div class="empty">${t('pace_none')}</div>`;
    return;
  }
  if(help) help.innerHTML=t('pace_help',{avg:d.overallAvg});

  const fastest=d.rows.filter(r=>r.delta<0).slice(0,PACE_SHOW);
  const slowest=d.rows.filter(r=>r.delta>0).slice(-PACE_SHOW).reverse();

  const rowHtml=(r)=>{
    const fast=r.delta<0;
    const w=Math.abs(r.delta)/d.maxAbs*50; // half-width track (50% each side)
    const mins=Math.abs(r.delta);
    const disp=(mins>=10?Math.round(mins):mins.toFixed(1));
    return `<div class="pace-row" data-cmd="${esc(r.name)}">
      <span class="pcm">${esc(r.name)}</span>
      <span class="pace-track"><span class="mid"></span><span class="fill ${fast?'f':'s'}" style="width:${w}%"></span></span>
      <span class="pace-delta ${fast?'f':'s'}">${fast?'−':'+'}${disp}m<small>${Math.round(r.avg)}m ${t('pace_avg')}</small></span>
    </div>`;
  };

  grid.innerHTML=`
    <div class="pace-col">
      <div class="pace-col-title fast">▼ ${t('pace_fastest')}</div>
      ${fastest.map(rowHtml).join('')||`<div class="empty" style="font-size:13px">—</div>`}
      <div class="pace-sub">${t('pace_min_note',{min:PACE_MIN_GAMES})}</div>
    </div>
    <div class="pace-col">
      <div class="pace-col-title slow">▲ ${t('pace_slowest')}</div>
      ${slowest.map(rowHtml).join('')||`<div class="empty" style="font-size:13px">—</div>`}
      <div class="pace-sub">${t('pace_vs_avg')}: ${d.overallAvg}m</div>
    </div>`;

  grid.querySelectorAll('.pace-row').forEach(el=>el.addEventListener('click',()=>openCommanderDetail(el.dataset.cmd)));
}




/* ===== commander detail computation (current year subset) ===== */
const CMD_MATCHUP_MIN = 3; // min games for a deck-vs-deck matchup to be shown
const MIN_TAG_GAMES = 10;  // min games for a player to be eligible for superlative tags
function computeCommanderDetail(cmdName){
  const games=gamesForYear();
  let g=0,w=0,rs=0,rn=0, solWith=0, solSeats=0, seatSum=0, seatN=0;
  const fin={1:0,2:0,3:0,4:0};
  const pilots={};          // player -> {g,w,rs}
  const vsPlayer={};        // opponent player -> {g,ahead,behind,ties}
  const vsCmd={};           // opponent commander -> {g,ahead,behind,ties}
  for(const gm of games){
    const me=gm.seats.find(s=>s.commander===cmdName);
    if(!me) continue;
    g++; if(me.rank===1)w++; rs+=me.rank; rn++;
    if(me.rank>=1&&me.rank<=4)fin[me.rank]++;
    if(me.sol!=null){solSeats++; if(me.sol===1)solWith++;}
    if(me.turn){seatSum+=me.turn; seatN++;}
    const pl=pilots[me.player]||(pilots[me.player]={g:0,w:0,rs:0});
    pl.g++; if(me.rank===1)pl.w++; pl.rs+=me.rank;
    for(const opp of gm.seats){
      if(opp===me) continue;
      const vp=vsPlayer[opp.player]||(vsPlayer[opp.player]={g:0,ahead:0,behind:0,ties:0});
      vp.g++; if(me.rank<opp.rank)vp.ahead++; else if(me.rank>opp.rank)vp.behind++; else vp.ties++;
      const vc=vsCmd[opp.commander]||(vsCmd[opp.commander]={g:0,ahead:0,behind:0,ties:0});
      vc.g++; if(me.rank<opp.rank)vc.ahead++; else if(me.rank>opp.rank)vc.behind++; else vc.ties++;
    }
  }
  if(g===0) return null;
  const pilotArr=Object.entries(pilots).map(([player,d])=>({player,games:d.g,wins:d.w,
    winrate:+(100*d.w/d.g).toFixed(1), avgrank:+(d.rs/d.g).toFixed(2)})).sort((a,b)=>b.games-a.games);
  const vsPlayerArr=Object.entries(vsPlayer).map(([player,d])=>({player,games:d.g,ahead:d.ahead,behind:d.behind,ties:d.ties,
    pct:+(100*d.ahead/d.g).toFixed(0)})).sort((a,b)=>b.pct-a.pct||b.games-a.games);
  const vsCmdArr=Object.entries(vsCmd).filter(([c,d])=>d.g>=CMD_MATCHUP_MIN).map(([cmd,d])=>({cmd,games:d.g,ahead:d.ahead,behind:d.behind,ties:d.ties,
    pct:+(100*d.ahead/d.g).toFixed(0)})).sort((a,b)=>b.pct-a.pct||b.games-a.games);
  return {
    name:cmdName, games:g, wins:w, winrate:+(100*w/g).toFixed(1), avgrank:+(rs/rn).toFixed(2),
    fin, finTot:fin[1]+fin[2]+fin[3]+fin[4],
    solRate: solSeats?+(100*solWith/solSeats).toFixed(0):null,
    avgSeat: seatN?+(seatSum/seatN).toFixed(1):null,
    pilots:pilotArr, vsPlayer:vsPlayerArr, vsCmd:vsCmdArr
  };
}

let cdName=null;
function openCommanderDetail(name){
  cdName=name;
  renderCommanderDetail();
  $('#views').style.display='none';
  $('#commanderDetail').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeCommanderDetail(){
  cdName=null;
  $('#commanderDetail').classList.remove('on');
  $('#views').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== commander detail rendering ===== */
function renderCommanderDetail(){
  if(!cdName)return;
  const d=computeCommanderDetail(cdName);
  const cont=$('#commanderDetail');

  const vsPlayerRows=d.vsPlayer.map(v=>{

      <span class="cd-vp-rec">${v.ahead}–${v.behind}${v.ties?'–'+v.ties:''}</span>
    </div>`;
  }).join('');

  // best / worst player callouts — require a meaningful sample so 1-game outliers
  // don't headline. Threshold scales down if the commander has few games overall.
  const CALL_MIN = Math.min(5, Math.max(2, Math.round(d.games/8)));
  const eligible = d.vsPlayer.filter(v=>v.games>=CALL_MIN);
  const pool = eligible.length>=2 ? eligible : d.vsPlayer; // fall back if too few qualify
  const bestP = pool[0];
  const worstP = pool[pool.length-1];

  // pilots
  const pilotRows=d.pilots.map(p=>{
    const col=wrColor(p.winrate);
    return `<div class="cd-pilot-row">
      <span class="cd-pilot-name">${p.player}</span>
      <span class="cd-pilot-games">${p.games} ${t('cd_games').toLowerCase()}</span>
      <div class="cd-pilot-track"><div class="cd-pilot-fill" style="width:${Math.max(p.winrate,3)}%;background:${col}"></div></div>
      <span class="cd-pilot-wr" style="color:${col}">${p.winrate}%</span>
    </div>`;
  }).join('');

  // deck matchups: best few and worst few
  let deckMatchupHtml='';
  if(d.vsCmd.length){
    const best=d.vsCmd.slice(0,5);
    const worst=d.vsCmd.slice(-5).reverse().filter(x=>!best.includes(x));
    const row=v=>{
      const col=v.pct>=55?'var(--win)':v.pct<=45?'var(--lose)':'var(--gold)';
      return `<div class="cd-dm-row">
        <span class="cd-dm-name">${v.cmd}</span>
        <span class="cd-dm-pct" style="color:${col}">${v.pct}%</span>
        <span class="cd-dm-rec">${v.ahead}–${v.behind}${v.ties?'–'+v.ties:''}</span>
        <span class="cd-dm-g">${v.games}${t('md_games_short')}</span>
      </div>`;
    };
    deckMatchupHtml=`
      <div class="cd-dm-cols">
        <div class="cd-dm-col">
          <div class="cd-dm-hd up">▲ ${t('cd_best_vs')}</div>
          ${best.map(row).join('')}
        </div>
        <div class="cd-dm-col">
          <div class="cd-dm-hd down">▼ ${t('cd_worst_vs')}</div>
          ${worst.length?worst.map(row).join(''):`<div class="cd-dm-empty">—</div>`}
        </div>
      </div>`;
  } else {
    deckMatchupHtml=`<div class="empty">${t('cd_no_matchups')}</div>`;
  }

  const extraStats=[];
  if(d.solRate!=null) extraStats.push(`${t('cd_solrate')}: <b>${d.solRate}%</b>`);
  if(d.avgSeat!=null) extraStats.push(`${t('cd_seat')}: <b>${d.avgSeat}</b>`);

  // color theming (only if we have color data for this commander)
  const cdCols=commanderColors(d.name);
  const accent=colorAccentBar(cdCols) || `linear-gradient(90deg,${wrCol},var(--gold))`;
  const tint=colorHeaderTint(cdCols);
  const tintLayer = tint ? `<div class="cd-tint" style="background:${tint}"></div>` : '';

  cont.innerHTML=`
    ${backBtn}
    <div class="cd-header${cdCols.length?' themed':''}">
      ${tintLayer}
      <div class="cd-topline" style="background:${accent}"></div>
      <div class="cd-title-row">
        <h2 class="cd-name">${d.name}</h2>
        ${colorPips(d.name,16)}
        ${extraStats.length?`<div class="cd-extra">${extraStats.join(' &nbsp;·&nbsp; ')}</div>`:''}
      </div>
      <div class="cd-stats">${heroStats}</div>
      <div class="cd-pilotline">${t('cd_piloted_by')}: ${d.pilots.map(p=>`<span class="cd-pilot-chip">${p.player} <b>${p.games}</b></span>`).join('')}</div>
    </div>

    <div class="cd-grid2">
      <div class="cd-card">
        <div class="cd-card-hd">${t('cd_vs_players')}</div>
        <div class="cd-card-sub">${t('cd_vs_players_sub')}</div>
        <div class="cd-vp-list">${vsPlayerRows}</div>
      </div>
      <div class="cd-side">
        <div class="cd-mini best">
          <div class="cd-mini-l">${t('cd_best_vs')}</div>
          <div class="cd-mini-who">${bestP?bestP.player:'—'}</div>
          ${bestP?`<div class="cd-mini-d">${bestP.pct}% ${t('cd_ahead')} · ${bestP.ahead}–${bestP.behind}${bestP.ties?'–'+bestP.ties:''}</div>`:''}
        </div>
        <div class="cd-mini worst">
          <div class="cd-mini-l">${t('cd_worst_vs')}</div>
          <div class="cd-mini-who">${worstP?worstP.player:'—'}</div>
          ${worstP?`<div class="cd-mini-d">${worstP.pct}% ${t('cd_ahead')} · ${worstP.ahead}–${worstP.behind}${worstP.ties?'–'+worstP.ties:''}</div>`:''}
        </div>
        <div class="cd-card cd-finish-card">
          <div class="cd-card-hd">${t('cd_finish_spread')}</div>
          <div class="fd-bar" style="height:30px;margin-top:12px">${finBar}</div>
          <div class="fd-legend" style="margin-top:12px;border:none;padding:0;justify-content:flex-start">${finLegend}</div>
        </div>
      </div>
    </div>

    ${d.pilots.length>1?`<div class="cd-card" style="margin-top:18px">
      <div class="cd-card-hd">${t('cd_by_pilot')}</div>
      <div class="cd-pilot-list">${pilotRows}</div>
    </div>`:''}

    <div class="cd-card" style="margin-top:18px">
      <div class="cd-card-hd">${t('cd_deck_matchups')}</div>
      <div class="cd-card-sub">${t('cd_deck_matchups_sub',{min:CMD_MATCHUP_MIN})}</div>
      ${deckMatchupHtml}
    </div>
  `;
  $('#cdBack').addEventListener('click',closeCommanderDetail);
}



/* ===== player detail computation ===== */
function computePlayerDetail(playerName){
  const games=gamesForYear();
  let g=0,w=0,rs=0,rn=0, solWith=0,solSeats=0;
  const fin={1:0,2:0,3:0,4:0};
  const decks={};       // commander -> {g,w,rs}
  const vsPlayer={};    // opponent -> {g,ahead,behind,ties}
  const seat={};        // turn -> {g,w}
  for(const gm of games){
    const me=gm.seats.find(s=>s.player===playerName);
    if(!me) continue;
    g++; if(me.rank===1)w++; rs+=me.rank; rn++;
    if(me.rank>=1&&me.rank<=4)fin[me.rank]++;
    if(me.sol!=null){solSeats++; if(me.sol===1)solWith++;}
    if(me.turn){const st=seat[me.turn]||(seat[me.turn]={g:0,w:0}); st.g++; if(me.rank===1)st.w++;}
    const dk=decks[me.commander]||(decks[me.commander]={g:0,w:0,rs:0});
    dk.g++; if(me.rank===1)dk.w++; dk.rs+=me.rank;
    for(const o of gm.seats){
      if(o.player===playerName) continue;
      const vp=vsPlayer[o.player]||(vsPlayer[o.player]={g:0,ahead:0,behind:0,ties:0});
      vp.g++; if(me.rank<o.rank)vp.ahead++; else if(me.rank>o.rank)vp.behind++; else vp.ties++;
    }
  }
  if(g===0) return null;
  const deckArr=Object.entries(decks).map(([commander,d])=>({commander,games:d.g,wins:d.w,
    winrate:+(100*d.w/d.g).toFixed(1), avgrank:+(d.rs/d.g).toFixed(2)})).sort((a,b)=>b.games-a.games||b.winrate-a.winrate);
  const RIVAL_DISPLAY_MIN=15; // hide opponents faced fewer than this many times (too noisy)
  let vsArr=Object.entries(vsPlayer).map(([player,d])=>({player,games:d.g,ahead:d.ahead,behind:d.behind,ties:d.ties,
    pct:+(100*d.ahead/d.g).toFixed(0)})).sort((a,b)=>b.pct-a.pct||b.games-a.games);
  const vsArrFiltered=vsArr.filter(v=>v.games>=RIVAL_DISPLAY_MIN);
  // if filtering leaves nothing (e.g. a narrow date range), fall back to all so the section isn't empty
  vsArr = vsArrFiltered.length>=1 ? vsArrFiltered : vsArr;
  const seatArr=[1,2,3,4].map(t=>{const d=seat[t]||{g:0,w:0};return {seat:t,games:d.g,wins:d.w,wr:d.g?+(100*d.w/d.g).toFixed(0):null};}).filter(s=>s.games>0);
  // best seat (min 5 games to be meaningful)
  const seatEligible=seatArr.filter(s=>s.games>=5);
  const bestSeat=(seatEligible.length?seatEligible:seatArr).slice().sort((a,b)=>b.wr-a.wr)[0];

  // YEAR ON YEAR — always across ALL years (ignores current filter)
  const allYears=[...new Set(ALL_GAMES.map(gm=>gm.date&&gm.date.slice(0,4)).filter(Boolean))].sort();
  const yoy=allYears.map(y=>{
    let yg=0,yw=0,yrs=0; const yf={1:0,2:0};
    ALL_GAMES.filter(gm=>gm.date&&gm.date.slice(0,4)===y).forEach(gm=>{
      const me=gm.seats.find(s=>s.player===playerName);
      if(!me)return; yg++; if(me.rank===1)yw++; yrs+=me.rank;
      if(me.rank===1)yf[1]++; if(me.rank===2)yf[2]++;
    });
    return {year:y, games:yg, wins:yw,
      winrate: yg?+(100*yw/yg).toFixed(1):null,
      avgrank: yg?+(yrs/yg).toFixed(2):null,
      podium: yg?+(100*(yf[1]+yf[2])/yg).toFixed(0):null};
  }).filter(r=>r.games>0);

  return {
    name:playerName, games:g, wins:w, winrate:+(100*w/g).toFixed(1), avgrank:+(rs/rn).toFixed(2),
    fin, finTot:fin[1]+fin[2]+fin[3]+fin[4],
    solRate: solSeats?+(100*solWith/solSeats).toFixed(0):null,
    bestSeat, decks:deckArr, vsPlayer:vsArr, seats:seatArr, yoy,
    colors: computePlayerColorProfile(deckArr)
  };
}

// Aggregate a player's decks into a color profile: per-color games/wins (a deck counts
// toward each color in its identity) and per-exact-combination tallies. Uses the deck
// list already computed for this player (so it respects the active year filter).
function computePlayerColorProfile(deckArr){
  const byColor={}; COLOR_ORDER.concat('C').forEach(c=>byColor[c]={g:0,w:0});
  const weighted={}; COLOR_ORDER.concat('C').forEach(c=>weighted[c]=0); // fractional share
  const byCombo={};   // combo key (e.g. "UB", "WUBRG", "C") -> {cols, g, w}
  let known=0;        // deck-games with known colors
  for(const dk of deckArr){
    const cols=commanderColors(dk.commander);
    if(!cols.length) continue;
    known+=dk.games;
    cols.forEach(c=>{ byColor[c].g+=dk.games; byColor[c].w+=dk.wins; });
    // weighted: each game contributes 1 total, split evenly across its colors
    const share=dk.games/cols.length;
    cols.forEach(c=>{ weighted[c]+=share; });
    const key=cols.join('');
    const cb=byCombo[key]||(byCombo[key]={cols, g:0, w:0});
    cb.g+=dk.games; cb.w+=dk.wins;
  }
  if(known===0) return null;
  const colorRows=COLOR_ORDER.concat('C')
    .map(c=>({c, g:byColor[c].g, w:byColor[c].w,
      wr:byColor[c].g?+(100*byColor[c].w/byColor[c].g).toFixed(1):null,
      pct:+(100*byColor[c].g/known).toFixed(1)}))   // share of games this color appears in
    .filter(r=>r.g>0);
  // weighted color share: fraction of the player's total color-weight per color (sums to 100%)
  const weightRows=COLOR_ORDER.concat('C')
    .map(c=>({c, share:weighted[c], pct:+(100*weighted[c]/known).toFixed(1)}))
    .filter(r=>r.share>0.0001)
    .sort((a,b)=>b.share-a.share);
  // favorite = most-played color; least = fewest games among colors actually played
  const byGames=colorRows.slice().sort((a,b)=>b.g-a.g || (b.wr||0)-(a.wr||0));
  const favorite = byGames[0] || null;
  const least = byGames.length>1 ? byGames[byGames.length-1] : null;
  const combos=Object.values(byCombo).map(cb=>({cols:cb.cols, key:cb.cols.join(''), g:cb.g, w:cb.w,
    wr:cb.g?+(100*cb.w/cb.g).toFixed(1):null,
    pct:+(100*cb.g/known).toFixed(1)}))            // share of total games (sums to 100%)
    .sort((a,b)=>b.g-a.g || (b.wr||0)-(a.wr||0));
  const mostCombo = combos[0] || null;
  const leastCombo = combos.length>1 ? combos[combos.length-1] : null;
  return {colorRows:byGames, weightRows, combos, favorite, least, mostCombo, leastCombo, knownGames:known,
    distinctCombos:combos.length};
}

let ppName=null;
function openPlayerDetail(name){
  ppName=name;
  renderPlayerDetail();
  $('#views').style.display='none';
  $('#playerDetail').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}
function closePlayerDetail(){
  ppName=null;
  $('#playerDetail').classList.remove('on');
  $('#views').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== player detail rendering ===== */
function renderPlayerDetail(){
  if(!ppName)return;
  const d=computePlayerDetail(ppName);
  const cont=$('#playerDetail');
  const backBtn=`<button class="md-back" id="ppBack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>${t('pp_back')}</button>`;
  if(!d){
    cont.innerHTML=backBtn+`<div class="empty">${t('pp_no_year')}</div>`;
    $('#ppBack').addEventListener('click',closePlayerDetail); return;
  }
  const wrCol=wrColor(d.winrate);
  const col=playerColor(d.name);
  // favorite-combo theming (falls back to the player's assigned color when no color data)
  const favCols=playerFavoriteCombo(d.name);
  const favAccent=colorAccentBar(favCols) || `linear-gradient(90deg,${col},var(--gold))`;
  const favTint=colorHeaderTint(favCols) ? `<div class="cd-tint" style="background:${colorHeaderTint(favCols)}"></div>` : '';
  const favPip=favCols.length?colorPipsFromArr(favCols,16):'';

  // hero stats
  const stats=[
    [t('pp_games'), d.games, ''],
    [t('pp_winrate'), d.winrate+'%', `color:${wrCol}`],
    [t('pp_avgfinish'), d.avgrank, ''],
    [t('pp_decks'), d.decks.length, ''],
  ];
  const heroStats=stats.map(s=>`<div class="cd-stat"><div class="cd-stat-v" style="${s[2]}">${s[1]}</div><div class="cd-stat-l">${s[0]}</div></div>`).join('');
  const extraStats=[];
  if(d.solRate!=null) extraStats.push(`${t('pp_solring')}: <b>${d.solRate}%</b>`);
  if(d.bestSeat) extraStats.push(`${t('pp_best_seat')}: <b>${t('pp_seat_label')} ${d.bestSeat.seat}</b> (${d.bestSeat.wr}%)`);

  // YEAR ON YEAR chart + table
  let yoyHtml='';
  if(d.yoy.length){
    // mini grouped bar chart: win rate per year
    const maxWr=Math.max(...d.yoy.map(y=>y.winrate||0),1);
    const bars=d.yoy.map(y=>{
      const h=(y.winrate||0)/maxWr*100;
      return `<div class="yoy-bar-col">
        <div class="yoy-bar-val">${y.winrate}%</div>
        <div class="yoy-bar-track"><div class="yoy-bar" style="height:${h}%;background:linear-gradient(180deg,${col},#2c6b3b)"></div></div>
        <div class="yoy-bar-yr">${y.year}</div>
        <div class="yoy-bar-sub">${y.games} ${t('pp_yoy_games').toLowerCase()}</div>
      </div>`;
    }).join('');
    const rows=d.yoy.map(y=>`<tr>
      <td class="yoy-yr">${y.year}</td>
      <td>${y.games}</td>
      <td>${y.wins}</td>
      <td><span style="color:${wrColor(y.winrate)};font-family:'Oswald';font-weight:600">${y.winrate}%</span></td>
      <td>${y.avgrank}</td>
      <td><span class="fc-podium">${y.podium}%</span></td>
    </tr>`).join('');
    yoyHtml=`
      <div class="section-head" style="margin-top:0;margin-bottom:14px"><h2 style="font-size:22px">${t('pp_yoy')}</h2><span class="hint">${t('pp_yoy_sub')}</span></div>
      <div class="pp-yoy-grid">
        <div class="cd-card"><div class="yoy-chart">${bars}</div></div>
        <div class="cd-card" style="padding:0;overflow:hidden">
          <table class="yoy-table">
            <thead><tr><th class="fc-l">${t('pp_yoy_year')}</th><th>${t('pp_yoy_games')}</th><th>${t('pp_yoy_wins')}</th><th>${t('pp_yoy_wr')}</th><th>${t('pp_yoy_avg')}</th><th>${t('pp_yoy_podium')}</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  // personal trend (rolling) — reuse SVG approach, single line
  const trend=computePlayerTrend(d.name);
  let trendHtml='';
  if(trend && trend.months.length>=2){
    const W=820,H=240,padL=40,padR=16,padT=16,padB=40;
    const plotW=W-padL-padR, plotH=H-padT-padB;
    const n=trend.months.length;
    const xAt=i=> padL+(n<=1?plotW/2:(i/(n-1))*plotW);
    const axP=niceAxis(trend.series.filter(v=>v!=null));
    const yAt=v=> padT+(1-(v-axP.lo)/(axP.hi-axP.lo))*plotH;
    let grid='';
    axP.ticks.forEach(v=>{const y=yAt(v);
      grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-width="1" ${v===axP.lo?'':'stroke-dasharray="2 4"'}/>`;
      grid+=`<text x="${padL-7}" y="${y+4}" text-anchor="end" fill="var(--ink3)" font-size="10" font-family="JetBrains Mono">${v}%</text>`;});
    let xl='';const step=Math.max(1,Math.ceil(n/6));
    for(let i=0;i<n;i+=step){const m=trend.months[i];const[y,mo]=m.split('-');
      xl+=`<text x="${xAt(i)}" y="${H-padB+18}" text-anchor="middle" fill="var(--ink3)" font-size="10" font-family="JetBrains Mono">${new Date(y,mo-1).toLocaleString(lang,{month:'short',year:'2-digit'})}</text>`;}
    const pts=trend.series.map((v,i)=>({v,i})).filter(o=>o.v!=null);
    let path='';
    if(pts.length>=2){pts.forEach((o,k)=>{path+=(k===0?'M':'L')+xAt(o.i)+' '+yAt(o.v);});}
    const line=pts.length>=2?`<path d="${path}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${xAt(pts[pts.length-1].i)}" cy="${yAt(pts[pts.length-1].v)}" r="3.5" fill="${col}"/>`:'';
    trendHtml=`
      <div class="section-head" style="margin-bottom:14px"><h2 style="font-size:22px">${t('pp_trend')}</h2><span class="hint">${t('pp_trend_sub')}</span></div>
      <div class="cd-card"><svg viewBox="0 0 ${W} ${H}" class="trend-svg" preserveAspectRatio="xMidYMid meet">${grid}${line}${xl}</svg></div>`;
  }

  // finish spread
  const segColors={1:'var(--gold)',2:'#9aa97f',3:'#6b7d6f',4:'#3a4a40'};
  const segLabels={1:t('finish_1st'),2:t('finish_2nd'),3:t('finish_3rd'),4:t('finish_4th')};
  const finBar=[1,2,3,4].map(r=>{const pct=d.finTot?100*d.fin[r]/d.finTot:0;if(pct<=0)return'';
    return `<div class="fd-seg" style="width:${pct}%;background:${segColors[r]}" title="${segLabels[r]}: ${d.fin[r]}">${pct>=10?Math.round(pct)+'%':''}</div>`;}).join('');
  const finLegend=[1,2,3,4].map(r=>`<span class="fd-leg-item"><span class="fd-leg-sw" style="background:${segColors[r]}"></span>${segLabels[r]} <b style="color:var(--ink2)">${d.fin[r]}</b></span>`).join('');

  // rivalries (clickable into H2H detail)
  const rivalRows=d.vsPlayer.map(v=>{

/* personal win-rate trend (rolling 3-month) for one player, current year subset */
function computePlayerTrend(playerName){
  const games=gamesForYear().filter(g=>g.date).sort((a,b)=>a.date<b.date?-1:1);
  if(!games.length) return null;
  const months=[...new Set(games.map(g=>g.date.slice(0,7)))].sort();
  if(months.length<2) return null;
  const series=months.map((m,i)=>{
    const window=months.slice(Math.max(0,i-2),i+1);
    let wg=0,ww=0;
    games.filter(g=>window.includes(g.date.slice(0,7))).forEach(g=>{
      const me=g.seats.find(s=>s.player===playerName);
      if(me){wg++; if(me.rank===1)ww++;}
    });
    return wg>=3?Math.round(100*ww/wg):null;
  });
  return {months, series};
}

/* ===== chart data computations (use current year subset) ===== */

/* Compute a tidy y-axis range from the actual plotted values so the chart
   fills the vertical space instead of always spanning 0-100%. Returns
   {lo, hi, ticks:[...]} with gridlines at nice round numbers. */
function niceAxis(values){
  const vals = values.filter(v=>v!=null && !isNaN(v));
  if(!vals.length) return {lo:0, hi:100, ticks:[0,25,50,75,100]};
  let mn=Math.min(...vals), mx=Math.max(...vals);
  if(mn===mx){ mn=Math.max(0,mn-10); mx=Math.min(100,mx+10); } // flat line -> give it room
  const span=mx-mn;
  const pad=Math.max(4, span*0.15);            // ~15% headroom each side
  let lo=Math.max(0, mn-pad);
  let hi=Math.min(100, mx+pad);
  // round outward to a clean step
  const step = span<=20 ? 5 : 10;
  lo=Math.floor(lo/step)*step;
  hi=Math.ceil(hi/step)*step;
  if(hi-lo<step) hi=lo+step;                    // guarantee at least one interval
  if(hi>100) hi=100;
  if(lo<0) lo=0;
  // build ticks
  const ticks=[];
  for(let v=lo; v<=hi+0.001; v+=step) ticks.push(Math.round(v));
  return {lo, hi, ticks};
}

const PLAYER_COLORS = ['#d9b25a','#3f9b54','#3a7bd5','#d6442f','#7a5b8c','#c98a3a','#5bbf8a'];
// Stable color per player: assigned once from the full all-time roster (sorted by total
// games desc) so a player's color never changes when the year/date filter changes.
let PLAYER_COLOR_MAP=null;
function buildPlayerColorMap(){
  const totals={};
  (ALL_GAMES||[]).forEach(g=>g.seats.forEach(s=>{ totals[s.player]=(totals[s.player]||0)+1; }));
  const ordered=Object.keys(totals).sort((a,b)=> totals[b]-totals[a] || a.localeCompare(b));
  PLAYER_COLOR_MAP={};
  ordered.forEach((p,i)=>{ PLAYER_COLOR_MAP[p]=PLAYER_COLORS[i % PLAYER_COLORS.length]; });
}
function playerColor(name){
  if(!PLAYER_COLOR_MAP) buildPlayerColorMap();
  return (PLAYER_COLOR_MAP && PLAYER_COLOR_MAP[name]) || PLAYER_COLORS[0];
}

function computeTrend(mode){ // mode: 'rolling' | 'career'
  const games = gamesForYear().filter(g=>g.date).sort((a,b)=>a.date<b.date?-1:1);
  if(!games.length) return null;
  const months=[...new Set(games.map(g=>g.date.slice(0,7)))].sort();
  if(months.length<2) return null;
  const players=CORE.slice();
  const series={};
  players.forEach(p=>series[p]=[]);
  if(mode==='career'){
    const cum={}; players.forEach(p=>cum[p]={g:0,w:0});
    months.forEach(m=>{
      games.filter(g=>g.date.slice(0,7)===m).forEach(g=>g.seats.forEach(s=>{
        if(cum[s.player]){cum[s.player].g++; if(s.rank===1)cum[s.player].w++;}}));
      players.forEach(p=>{const d=cum[p]; series[p].push(d.g?Math.round(100*d.w/d.g):null);});
    });
  } else {
    months.forEach((m,i)=>{
      const window=months.slice(Math.max(0,i-2),i+1);
      const acc={}; players.forEach(p=>acc[p]={g:0,w:0});
      games.filter(g=>window.includes(g.date.slice(0,7))).forEach(g=>g.seats.forEach(s=>{
        if(acc[s.player]){acc[s.player].g++; if(s.rank===1)acc[s.player].w++;}}));
      players.forEach(p=>{const d=acc[p]; series[p].push(d.g>=3?Math.round(100*d.w/d.g):null);});
    });
  }
  return {months, players, series};
}

function computeFinishDist(){
  const games=gamesForYear();
  const fin={};
  games.forEach(g=>g.seats.forEach(s=>{
    fin[s.player]=fin[s.player]||{1:0,2:0,3:0,4:0,tot:0};
    if(s.rank>=1&&s.rank<=4){fin[s.player][s.rank]++; fin[s.player].tot++;}
  }));
  return CORE.map(p=>{const d=fin[p]||{1:0,2:0,3:0,4:0,tot:0};
    return {player:p, c1:d[1],c2:d[2],c3:d[3],c4:d[4],tot:d.tot,
      p1:d.tot?100*d[1]/d.tot:0,p2:d.tot?100*d[2]/d.tot:0,p3:d.tot?100*d[3]/d.tot:0,p4:d.tot?100*d[4]/d.tot:0};
  }).filter(x=>x.tot>0);
}

function computeTurnOrder(){
  const games=gamesForYear();
  const turn={};
  let total=0;
  games.forEach(g=>g.seats.forEach(s=>{if(s.turn){turn[s.turn]=turn[s.turn]||{g:0,w:0};turn[s.turn].g++;if(s.rank===1)turn[s.turn].w++;total++;}}));
  const rows=[1,2,3,4].map(seat=>{const d=turn[seat]||{g:0,w:0};
    return {seat, games:d.g, wins:d.w, wr:d.g?+(100*d.w/d.g).toFixed(1):0};}).filter(r=>r.games>0);
  return {rows, total};
}

function computeSolRing(){
  const games=gamesForYear();
  let w1={g:0,w:0}, w0={g:0,w:0};
  games.forEach(g=>g.seats.forEach(s=>{
    if(s.sol===1){w1.g++; if(s.rank===1)w1.w++;}
    else if(s.sol===0){w0.g++; if(s.rank===1)w0.w++;}
  }));
  const totSeats=w1.g+w0.g;
  return {
    withWr: w1.g?+(100*w1.w/w1.g).toFixed(1):0, withG:w1.g,
    withoutWr: w0.g?+(100*w0.w/w0.g).toFixed(1):0, withoutG:w0.g,
    rate: totSeats?+(100*w1.g/totSeats).toFixed(1):0,
    hasData: totSeats>0
  };
}


/* ===== chart rendering (SVG, no libraries) ===== */
let trendMode='rolling';

function renderTrends(){
  // toggle buttons state + hints
  document.querySelectorAll('#trendToggle button').forEach(b=>b.classList.toggle('on',b.dataset.tm===trendMode));
  const hint=$('#trendHint'); if(hint) hint.textContent = trendMode==='rolling'?t('trend_rolling_hint'):t('trend_career_hint');

  const data=computeTrend(trendMode);
  const host=$('#trendChart');
  if(!data){host.innerHTML=`<div class="empty">${t('trend_no_data')}</div>`; renderTrendLegend(null); return;}

  const W=860, H=380, padL=44, padR=20, padT=20, padB=54;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n=data.months.length;
  const xAt=i=> padL + (n<=1?plotW/2:(i/(n-1))*plotW);
  // auto-scale the y-axis to the data so lines fill the chart
  const allVals=[]; data.players.forEach(p=>data.series[p].forEach(v=>{ if(v!=null) allVals.push(v); }));
  const ax=niceAxis(allVals);
  const yAt=v=> padT + (1-(v-ax.lo)/(ax.hi-ax.lo))*plotH;

  let grid='';
  ax.ticks.forEach(v=>{
    const y=yAt(v);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-width="1" ${v===ax.lo?'':'stroke-dasharray="2 4"'}/>`;
    grid+=`<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="var(--ink3)" font-size="11" font-family="JetBrains Mono">${v}%</text>`;
  });

  // x labels (show ~6 evenly)
  let xlabels='';
  const step=Math.max(1,Math.ceil(n/6));
  for(let i=0;i<n;i+=step){
    const m=data.months[i]; const [y,mo]=m.split('-');
    const lbl=new Date(y,mo-1).toLocaleString(lang,{month:'short',year:'2-digit'});
    xlabels+=`<text x="${xAt(i)}" y="${H-padB+20}" text-anchor="middle" fill="var(--ink3)" font-size="10.5" font-family="JetBrains Mono">${lbl}</text>`;
  }

  // lines per player (skip null gaps)
  let paths='';
  data.players.forEach(p=>{
    const col=playerColor(p);
    const pts=data.series[p].map((v,i)=>({v,i})).filter(o=>o.v!=null);
    if(pts.length<2) return;
    let d='';
    pts.forEach((o,k)=>{ d+=(k===0?'M':'L')+xAt(o.i)+' '+yAt(o.v); });
    paths+=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.92"/>`;
    // end dot
    const last=pts[pts.length-1];
    paths+=`<circle cx="${xAt(last.i)}" cy="${yAt(last.v)}" r="3.5" fill="${col}"/>`;
  });

  host.innerHTML=`<svg viewBox="0 0 ${W} ${H}" class="trend-svg" preserveAspectRatio="xMidYMid meet">${grid}${paths}${xlabels}</svg>`;
  renderTrendLegend(data.players);
}
function renderTrendLegend(players){
  const host=$('#trendLegend');
  if(!players){host.innerHTML='';return;}
  host.innerHTML=players.map(p=>{
    const s=S.players.find(x=>x.name===p);
    return `<span class="tl-item"><span class="tl-dot" style="background:${playerColor(p)}"></span>${p} <span class="tl-pct">${s?s.winrate+'%':''}</span></span>`;
  }).join('');
}

  const host=document.getElementById('finishChart');
  if(!host)return;
  if(!data.length){host.innerHTML=`<div class="empty">—</div>`;return;}
  const hosts=[host];
  // horizontal stacked bars, one per player, sorted by 1st-place %
  data.sort((a,b)=>b.p1-a.p1);
  const segColors={1:'var(--gold)',2:'#9aa97f',3:'#6b7d6f',4:'#3a4a40'};
  const segLabels={1:t('finish_1st'),2:t('finish_2nd'),3:t('finish_3rd'),4:t('finish_4th')};
  const htmlOut = data.map(d=>{
    const segs=[1,2,3,4].map(r=>{

  hosts.forEach(h=>h.innerHTML=htmlOut);
}

/* ===== Quirky player tags (pod-wide superlatives) ===== */
// Each tag is awarded to ONE player (the extreme on some dimension), over the active
// year filter. Returns { playerName: [ {key, cls} ] }. Renders on leaderboard + detail.
let _tagCache=null;
function computePlayerTags(){
  const games=gamesForYear();
  if(!games.length) return {};
  const P={};
  const ensure=p=>P[p]||(P[p]={g:0,w:0,pod:0,sol:0,soln:0,gt:0,gtn:0,decks:{}});
  for(const gm of games){
    for(const s of gm.seats){
      const p=ensure(s.player);
      p.g++; if(s.rank===1)p.w++; if(s.rank<=2)p.pod++;
      if(s.sol!=null){p.soln++; if(s.sol===1)p.sol++;}
      if(gm.gametime!=null){p.gt+=gm.gametime; p.gtn++;}
      p.decks[s.commander]=(p.decks[s.commander]||0)+1;
    }
  }
  const players=Object.keys(P).filter(p=>P[p].g>=MIN_TAG_GAMES);
  if(!players.length) return {};
  players.forEach(p=>{const o=P[p];
    o.wr=100*o.w/o.g; o.podpct=100*o.pod/o.g;
    o.solrate=o.soln? 100*o.sol/o.soln : null;
    o.avgGt=o.gtn? o.gt/o.gtn : null;
    o.distinct=Object.keys(o.decks).length;
    o.topPct=100*Math.max(...Object.values(o.decks))/o.g;
  });
  const streaks=computeStreaks();
  const byName={}; streaks.forEach(s=>byName[s.player]=s);

  const tags={}; players.forEach(p=>tags[p]=[]);
  const award=(key,cls,player)=>{ if(player&&tags[player]) tags[player].push({key,cls}); };
  const argmax=(fn,elig)=>{let best=null,bp=null;(elig||players).forEach(p=>{const v=fn(P[p],p);if(v==null)return;if(best==null||v>best){best=v;bp=p;}});return bp;};
  const argmin=(fn,elig)=>{let best=null,bp=null;(elig||players).forEach(p=>{const v=fn(P[p],p);if(v==null)return;if(best==null||v<best){best=v;bp=p;}});return bp;};

  award('tag_endboss','endboss', argmax(o=>o.wr));
  award('tag_badluck','badluck', argmin(o=>o.wr));
  award('tag_grinder','grinder', argmax(o=>o.g));
  award('tag_bench','bench', argmin(o=>o.g));
  award('tag_podium','podium', argmax(o=>o.podpct));
  award('tag_solking','solking', argmax(o=>o.solrate!=null?o.solrate:null));
  award('tag_brewer','brewer', argmax(o=>o.distinct));
  award('tag_onetrick','onetrick', argmax(o=>o.topPct));
  const timed=players.filter(p=>P[p].avgGt!=null);
  if(timed.length>1){
    award('tag_slowpoke','slowpoke', argmax(o=>o.avgGt, timed));
    award('tag_speed','speed', argmin(o=>o.avgGt, timed));
  }
  award('tag_streaker','streaker', argmax((_,p)=>byName[p]?byName[p].bestWin:null));
  award('tag_rentner','rentner', argmax((_,p)=>byName[p]?byName[p].bestDry:null));
  let fireP=null,fireN=1;
  players.forEach(p=>{const s=byName[p]; if(s&&s.curWin>fireN){fireN=s.curWin;fireP=p;}});
  award('tag_onfire','onfire', fireP);
  // fallback: anyone eligible who earned no tag is "just here for decoration"
  players.forEach(p=>{ if(tags[p].length===0) tags[p].push({key:'tag_deco', cls:'deco'}); });
  return tags;
}
function playerTagsFor(name){
  if(!_tagCache) _tagCache=computePlayerTags();
  return _tagCache[name]||[];
}
function renderTagChips(name, max){
  const tags=playerTagsFor(name);
  if(!tags.length) return '';
  const show=max?tags.slice(0,max):tags;
  return `<span class="ptags">`+show.map(tg=>`<span class="ptag ptag-${tg.cls}" title="${t(tg.key+'_d')}">${t(tg.key)}</span>`).join('')+`</span>`;
}

/* ===== Cross-player Year-on-Year comparison =====
   Uses ALL_GAMES (own year handling), ignoring the global year filter so the
   whole history is comparable side by side. */
function computeCompare(){
  const games=(ALL_GAMES||[]).slice();
  const years=[...new Set(games.map(g=>g.date&&g.date.slice(0,4)).filter(Boolean))].sort();
  const cols=['all',...years];   // an "All-time" column plus each year
  // accumulator: player -> colKey -> bucket
  const acc={};
  const blank=()=>({g:0,w:0,rs:0,rn:0,sol:0,soln:0,seat:0,seatn:0,pod:0,
    cmd:{},color:{}});
  function bump(pl,key,s){
    const P=acc[pl]||(acc[pl]={}); const b=P[key]||(P[key]=blank());
    b.g++; if(s.rank===1)b.w++; b.rs+=s.rank; b.rn++;
    if(s.rank<=2)b.pod++;
    if(s.sol!=null){b.soln++; if(s.sol===1)b.sol++;}
    if(s.turn){b.seat+=s.turn; b.seatn++;}
    b.cmd[s.commander]=(b.cmd[s.commander]||0)+1;
    commanderColors(s.commander).forEach(c=>{ b.color[c]=(b.color[c]||0)+1; });
  }
  for(const g of games){
    const yr=g.date&&g.date.slice(0,4);
    for(const s of g.seats){ bump(s.player,'all',s); if(yr) bump(s.player,yr,s); }
  }
  const topKey=obj=>{ const e=Object.entries(obj); if(!e.length) return null;
    e.sort((a,b)=>b[1]-a[1]); return {k:e[0][0], n:e[0][1]}; };
  const finalize=b=>{
    if(!b||!b.g) return null;
    return {
      games:b.g, wins:b.w,
      winrate:+(100*b.w/b.g).toFixed(1),
      avg:+(b.rs/b.rn).toFixed(2),
      podium:+(100*b.pod/b.g).toFixed(0),
      sol: b.soln? +(100*b.sol/b.soln).toFixed(0):null,
      seat: b.seatn? +(b.seat/b.seatn).toFixed(2):null,
      topCmd: topKey(b.cmd),
      topColor: topKey(b.color)
    };
  };
  const players=Object.keys(acc).sort((a,b)=>{
    const ga=acc[a].all?acc[a].all.g:0, gb=acc[b].all?acc[b].all.g:0; return gb-ga;
  });
  const rows=players.map(pl=>{
    const byCol={}; cols.forEach(c=>byCol[c]=finalize(acc[pl][c]));
    return {player:pl, byCol};
  });
  return {cols, years, rows};
}

/* ===== Win streaks & droughts ===== */
// For each ranked player, walk their games chronologically and find the longest run
// of consecutive wins (rank 1) and the longest drought (consecutive games without a win),
// plus their current active streak/drought.
function computeStreaks(){
  const games=gamesForYear().filter(g=>g.date).slice().sort((a,b)=>{
    const da=a.date||'', db=b.date||''; if(da!==db) return da<db?-1:1; return (a.order||0)-(b.order||0);
  });
  const seq={}; // player -> [1/0,...] chronological
  for(const g of games) for(const s of g.seats){
    (seq[s.player]=seq[s.player]||[]).push(s.rank===1?1:0);
  }
  const rows=[];
  for(const p of (CORE.length?CORE:Object.keys(seq))){
    const arr=seq[p]; if(!arr||!arr.length) continue;
    let bestWin=0, curWin=0, bestDry=0, curDry=0;
    let tailWin=0, tailDry=0;
    arr.forEach(v=>{
      if(v===1){ curWin++; curDry=0; if(curWin>bestWin)bestWin=curWin; }
      else { curDry++; curWin=0; if(curDry>bestDry)bestDry=curDry; }
    });
    // current active run = trailing streak
    for(let i=arr.length-1;i>=0 && arr[i]===1;i--) tailWin++;
    for(let i=arr.length-1;i>=0 && arr[i]===0;i--) tailDry++;
    rows.push({player:p, games:arr.length, bestWin, bestDry,
      curWin:tailWin, curDry:tailDry});
  }
  rows.sort((a,b)=> b.bestWin-a.bestWin || a.bestDry-b.bestDry);
  return rows;
}
function renderStreaks(){
  const host=$('#streakChart'); if(!host) return;
  const rows=computeStreaks();
  if(!rows.length){ host.innerHTML=`<div class="empty" style="padding:16px">${t('streak_none')}</div>`; return; }
  const maxWin=Math.max(...rows.map(r=>r.bestWin),1);
  const maxDry=Math.max(...rows.map(r=>r.bestDry),1);
  host.innerHTML=`<div class="strk-list">`+rows.map(r=>{
    const col=playerColor(r.player);
    const curTxt = r.curWin>0
      ? `<span class="strk-cur win">${t('streak_cur_win',{n:r.curWin})}</span>`
      : (r.curDry>0 ? `<span class="strk-cur dry">${t('streak_cur_dry',{n:r.curDry})}</span>` : '');
    return `<div class="strk-row">
      <div class="strk-name" data-player="${esc(r.player)}"><span class="strk-dot" style="background:${col}"></span>${esc(r.player)}</div>
      <div class="strk-bars">

        </div>
        <div class="strk-metric">

          <div class="strk-track"><div class="strk-fill dry" style="width:${r.bestDry/maxDry*100}%">${r.bestDry}</div></div>
        </div>
      </div>

    </div>`;
  }).join('')+`</div>`;
  host.querySelectorAll('.strk-name[data-player]').forEach(el=>el.addEventListener('click',()=>openPlayerDetail(el.dataset.player)));

/* ===== Commander diversity (one-trick vs brewer) ===== */
// Per player: distinct commanders piloted, total games, % on their single most-played deck,
// and a normalized diversity score (effective number of decks / games -> 0..1-ish).
function computeDiversity(){
  const games=gamesForYear();
  const byP={}; // player -> {total, decks:{cmd:count}}
  for(const g of games) for(const s of g.seats){
    const p=byP[s.player]||(byP[s.player]={total:0, decks:{}});
    p.total++; p.decks[s.commander]=(p.decks[s.commander]||0)+1;
  }
  const rows=[];
  for(const p of (CORE.length?CORE:Object.keys(byP))){
    const d=byP[p]; if(!d||d.total<1) continue;
    const counts=Object.values(d.decks);
    const distinct=counts.length;
    const top=Math.max(...counts);
    const topPct=+(100*top/d.total).toFixed(0);
    // Shannon effective number of decks (perplexity): higher = more spread
    const props=counts.map(c=>c/d.total);
    const H=-props.reduce((s,x)=>s+ (x>0? x*Math.log(x):0),0);
    const eff=Math.exp(H); // effective distinct decks
    rows.push({player:p, total:d.total, distinct, topPct, eff:+eff.toFixed(1)});
  }
  rows.sort((a,b)=> b.eff-a.eff || b.distinct-a.distinct);
  return rows;
}
function renderDiversity(){
  const host=$('#divChart'); if(!host) return;
  const rows=computeDiversity();
  if(!rows.length){ host.innerHTML=`<div class="empty" style="padding:16px">${t('div_none')}</div>`; return; }
  const maxEff=Math.max(...rows.map(r=>r.eff),1);
  host.innerHTML=`<div class="strk-list">`+rows.map(r=>{
    const col=playerColor(r.player);
    // label the archetype at the extremes
    const tag = r.eff>=Math.max(4, maxEff*0.7) ? `<span class="div-tag brewer">${t('div_brewer')}</span>`
      : (r.topPct>=50 ? `<span class="div-tag trick">${t('div_trick')}</span>` : '');
    return `<div class="div-row">
      <div class="strk-name" data-player="${esc(r.player)}"><span class="strk-dot" style="background:${col}"></span>${esc(r.player)}${tag}</div>
      <div class="div-track"><div class="div-fill" style="width:${r.eff/maxEff*100}%;background:${col}"></div></div>
      <div class="div-stats">
        <span><b>${r.distinct}</b> ${t('div_decks')}</span>
        <span class="div-sep">·</span>

/* ===== Pod parity over time (is the group balancing?) ===== */
// For each month, compute the spread of win rates across active players (max-min, and
// standard deviation). A shrinking spread = more balanced pod. We plot the spread line.
function computeParity(){
  const games=gamesForYear().filter(g=>g.date);
  if(!games.length) return null;
  const months=[...new Set(games.map(g=>g.date.slice(0,7)))].sort();
  if(months.length<2) return null;
  // rolling 3-month window win rate per player, then spread across players with >=4 games in window
  const series=months.map((m,i)=>{
    const win=months.slice(Math.max(0,i-2),i+1);
    const wg={}, ww={};
    games.filter(g=>win.includes(g.date.slice(0,7))).forEach(g=>g.seats.forEach(s=>{
      wg[s.player]=(wg[s.player]||0)+1; if(s.rank===1)ww[s.player]=(ww[s.player]||0)+1;
    }));
    const wrs=Object.keys(wg).filter(p=>wg[p]>=4).map(p=>100*(ww[p]||0)/wg[p]);
    if(wrs.length<2) return {month:m, spread:null, sd:null};
    const mx=Math.max(...wrs), mn=Math.min(...wrs);
    const mean=wrs.reduce((a,b)=>a+b,0)/wrs.length;
    const sd=Math.sqrt(wrs.reduce((s,x)=>s+(x-mean)**2,0)/wrs.length);
    return {month:m, spread:+(mx-mn).toFixed(0), sd:+sd.toFixed(1)};
  });
  return {months, series};
}
function renderParity(){
  const host=$('#parityChart'), note=$('#parityNote'); if(!host) return;
  const d=computeParity();
  if(!d){ host.innerHTML=`<div class="empty" style="padding:16px">${t('parity_none')}</div>`; if(note)note.textContent=''; return; }
  const pts=d.series.map((s,i)=>({v:s.sd,i})).filter(o=>o.v!=null);
  if(pts.length<2){ host.innerHTML=`<div class="empty" style="padding:16px">${t('parity_none')}</div>`; if(note)note.textContent=''; return; }
  const W=860,H=300,padL=44,padR=20,padT=20,padB=46, plotW=W-padL-padR, plotH=H-padT-padB, n=d.months.length;
  const xAt=i=> padL+(n<=1?plotW/2:(i/(n-1))*plotW);
  const ax=niceAxis(pts.map(o=>o.v));
  const yAt=v=> padT+(1-(v-ax.lo)/(ax.hi-ax.lo))*plotH;
  let grid='';
  ax.ticks.forEach(v=>{const y=yAt(v);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-width="1" ${v===ax.lo?'':'stroke-dasharray="2 4"'}/>`;
    grid+=`<text x="${padL-8}" y="${y+4}" text-anchor="end" fill="var(--ink3)" font-size="11" font-family="JetBrains Mono">${v}</text>`;});
  let xl='';const step=Math.max(1,Math.ceil(n/6));
  for(let i=0;i<n;i+=step){const[y,mo]=d.months[i].split('-');
    xl+=`<text x="${xAt(i)}" y="${H-padB+20}" text-anchor="middle" fill="var(--ink3)" font-size="10.5" font-family="JetBrains Mono">${new Date(y,mo-1).toLocaleDateString(lang,{month:'short',year:'2-digit'})}</text>`;}
  let path=''; pts.forEach((o,k)=>{ path+=(k===0?'M':'L')+xAt(o.i)+' '+yAt(o.v); });
  const area=path+`L${xAt(pts[pts.length-1].i)} ${padT+plotH}L${xAt(pts[0].i)} ${padT+plotH}Z`;
  host.innerHTML=`<svg viewBox="0 0 ${W} ${H}" class="trend-svg" preserveAspectRatio="xMidYMid meet">
    ${grid}
    <path d="${area}" fill="rgba(217,178,90,0.10)" stroke="none"/>
    <path d="${path}" fill="none" stroke="var(--gold)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${xAt(pts[pts.length-1].i)}" cy="${yAt(pts[pts.length-1].v)}" r="3.5" fill="var(--gold)"/>
    ${xl}
  </svg>`;
  // trend note: compare first third vs last third average spread
  if(note){
    const vals=pts.map(o=>o.v);
    const third=Math.max(1,Math.floor(vals.length/3));
    const early=vals.slice(0,third).reduce((a,b)=>a+b,0)/third;
    const late=vals.slice(-third).reduce((a,b)=>a+b,0)/third;
    const diff=late-early;
    const verdict = Math.abs(diff)<2 ? t('parity_steady')
      : (diff<0 ? t('parity_closer') : t('parity_wider'));
    note.innerHTML=t('parity_note',{verdict:`<b>${verdict}</b>`});
  }
}

/* ===== matchup detail (deck-by-deck) ===== */
function computeMatchupDetail(pA, pB){
  const games = gamesForYear();
  const hh={games:0,aAhead:0,bAhead:0,ties:0};
  const cmdPairs={}, aCmds={}, bCmds={};
  for(const g of games){
    const sa=g.seats.find(s=>s.player===pA);
    const sb=g.seats.find(s=>s.player===pB);
    if(!sa||!sb) continue;
    hh.games++;
    if(sa.rank<sb.rank)hh.aAhead++; else if(sa.rank>sb.rank)hh.bAhead++; else hh.ties++;
    const key=sa.commander+'|||'+sb.commander;
    const cp=cmdPairs[key]||(cmdPairs[key]={aCmd:sa.commander,bCmd:sb.commander,games:0,aAhead:0,bAhead:0,ties:0});
    cp.games++; if(sa.rank<sb.rank)cp.aAhead++; else if(sa.rank>sb.rank)cp.bAhead++; else cp.ties++;
    const ac=aCmds[sa.commander]||(aCmds[sa.commander]={cmd:sa.commander,games:0,ahead:0,behind:0,ties:0});
    ac.games++; if(sa.rank<sb.rank)ac.ahead++; else if(sa.rank>sb.rank)ac.behind++; else ac.ties++;
    const bc=bCmds[sb.commander]||(bCmds[sb.commander]={cmd:sb.commander,games:0,ahead:0,behind:0,ties:0});
    bc.games++; if(sb.rank<sa.rank)bc.ahead++; else if(sb.rank>sa.rank)bc.behind++; else bc.ties++;
  }
  return {
    hh,
    cmdPairs:Object.values(cmdPairs).sort((a,b)=>b.games-a.games||(b.aAhead-b.bAhead)-(a.aAhead-a.bAhead)),
    aCmds:Object.values(aCmds).sort((a,b)=>b.games-a.games),
    bCmds:Object.values(bCmds).sort((a,b)=>b.games-a.games)
  };
}

  // free-text custom window size
  const cust=$('#rgWinCustom');

  if(cust){

  }
})();

async function load(){
  buildLangSel();applyStaticI18n();
  $('#app').style.display='none';$('#error').style.display='none';$('#loading').style.display='flex';
  if(!SHEET_CSV_URL||SHEET_CSV_URL.includes('PASTE_YOUR')){
    $('#loading').style.display='none';$('#error').style.display='flex';
    $('#errMsg').textContent='';return;
  }
  try{
    const res=await fetch(SHEET_CSV_URL,{cache:'no-store'});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    if(/<html/i.test(text.slice(0,200)))throw new Error("Got HTML, not CSV — check the published link format.");
    ALL_GAMES=parseGames(text);
    buildPlayerColorMap();
    // optional: commander colors from the second tab (never fatal)
    COMMANDER_COLORS={}; COMMANDER_COLOR_INDEX={}; _favColorCache=null; _favComboCache=null;
    const cu=colorsCsvUrl();
    if(cu){
      try{
        const cres=await fetch(cu,{cache:'no-store'});
        if(cres.ok){
          const ctext=await cres.text();
          if(!/<html/i.test(ctext.slice(0,200))){
            const parsed=parseColors(ctext);
            COMMANDER_COLORS=parsed.map; COMMANDER_COLOR_INDEX=parsed.index;
          }
        }
      }catch(ce){ console.warn('Colors sheet not loaded:', ce); }
    }
    YEARS=[...new Set(ALL_GAMES.map(g=>g.date&&g.date.slice(0,4)).filter(Boolean))].sort();
    ALL_MONTHS=[...new Set(ALL_GAMES.map(g=>g.date&&g.date.slice(0,7)).filter(Boolean))].sort();
    curYear = YEARS.includes(DEFAULT_YEAR) ? DEFAULT_YEAR : 'all';
    customRange=null;
    buildYearSel();
    $('#footSrc').textContent=SHEET_CSV_URL;
    $('#loading').style.display='none';$('#app').style.display='block';
    rebuild();
  }catch(err){
    $('#loading').style.display='none';$('#error').style.display='flex';
    $('#errMsg').textContent=(err&&err.message)?err.message:String(err);
    console.error(err);
  }
}
